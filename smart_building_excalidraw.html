let excalidrawAPI = null;

// Initialize Excalidraw
function initExcalidraw() {
  const { Excalidraw, exportToSvg, exportToBlob } = window.ExcalidrawLib;
  
  const App = () => {
    const [elements, setElements] = React.useState(excalidrawData.elements);
    const [appState, setAppState] = React.useState(excalidrawData.appState);
    
    const handleChange = (newElements, newAppState) => {
      setElements(newElements);
      setAppState(newAppState);
    };
    
    const handleExcalidrawAPI = (api) => {
      excalidrawAPI = api;
    };
    
    return React.createElement(Excalidraw, {
      initialData: excalidrawData,
      onChange: handleChange,
      onExcalidrawAPI: handleExcalidrawAPI,
      viewModeEnabled: false,
      zenModeEnabled: false,
      gridModeEnabled: false
    });
  };
  
  const root = ReactDOM.createRoot(document.getElementById('excalidraw'));
  root.render(React.createElement(App));
}

// Export functions
async function exportSVG() {
  if (!excalidrawAPI) return;
  const { exportToSvg } = window.ExcalidrawLib;
  const elements = excalidrawAPI.getSceneElements();
  const appState = excalidrawAPI.getAppState();
  
  const svg = await exportToSvg({
    elements,
    appState: { ...appState, exportBackground: true, exportWithDarkMode: false },
    files: excalidrawAPI.getFiles()
  });
  
  const svgData = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([svgData], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '智慧建筑配电方案_手绘图.svg';
  a.click();
  URL.revokeObjectURL(url);
}

async function exportPNG() {
  if (!excalidrawAPI) return;
  const { exportToBlob } = window.ExcalidrawLib;
  const elements = excalidrawAPI.getSceneElements();
  const appState = excalidrawAPI.getAppState();
  
  const blob = await exportToBlob({
    elements,
    appState: { ...appState, exportBackground: true, exportWithDarkMode: false },
    files: excalidrawAPI.getFiles(),
    mimeType: 'image/png',
    quality: 1
  });
  
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '智慧建筑配电方案_手绘图.png';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadExcalidraw() {
  const data = JSON.stringify(excalidrawData, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '智慧建筑配电方案_手绘图.excalidraw';
  a.click();
  URL.revokeObjectURL(url);
}

// Initialize when DOM is ready
document.addEventListener('DOMContentLoaded', () => {
  // Wait for Excalidraw to load
  const checkExcalidraw = setInterval(() => {
    if (window.ExcalidrawLib) {
      clearInterval(checkExcalidraw);
      initExcalidraw();
    }
  }, 100);
});
