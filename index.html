    }else{
      div.innerHTML='<span class="nav-icon">◆</span><span>'+key+'</span>';
      navMain.appendChild(div);
    }

    div.onclick=function(){showContent(key)};
  });
}

function showContent(key){
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.classList.toggle('active',el.dataset.key===key);
  });

  var md=memoryData[key];
  document.getElementById('contentArea').innerHTML=renderMarkdown(md);

  var isArchive=key.indexOf('2026-')===0;
  document.getElementById('heroTitle').textContent=key;
  document.getElementById('statsGrid').style.display=isArchive?'none':'grid';
  document.getElementById('heroSub').textContent=isArchive?'每日记忆归档':'AI助理豆豆的长期记忆系统 — 文件架构、技能安装、决策记录、基金跟踪';
}

function renderMarkdown(md){
  var lines=md.split('\n'),html='',inList=false,inCode=false,inTable=false,tableHead=false;
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(line.trim().startsWith('```')){if(inCode){html+='</code></pre>';inCode=false}else{html+='<pre><code>';inCode=true}continue}
    if(inCode){html+=esc(line)+'\n';continue}
    if(line.startsWith('# ')){closeList();html+='<h1>'+fmt(line.slice(2))+'</h1>';continue}
    if(line.startsWith('## ')){closeList();html+='<h2>'+fmt(line.slice(3))+'</h2>';continue}
    if(line.startsWith('### ')){closeList();html+='<h3>'+fmt(line.slice(4))+'</h3>';continue}
    if(line.startsWith('#### ')){closeList();html+='<h4>'+fmt(line.slice(5))+'</h4>';continue}
    if(line.includes('|')&&line.trim().startsWith('|')){
      if(!inTable){inTable=true;tableHead=false;html+='<table>'}
      if(line.match(/^\|[\s\-:|]+\|$/)){tableHead=true;continue}
      var cells=line.split('|').filter(function(c){return c.trim()!=''});
      if(!tableHead){html+='<thead><tr>';cells.forEach(function(c){html+='<th>'+fmt(c.trim())+'</th>'});html+='</tr></thead><tbody>'}
      else{html+='<tr>';cells.forEach(function(c){html+='<td>'+fmt(c.trim())+'</td>'});html+='</tr>'}
      continue;
    }else if(inTable){html+='</tbody></table>';inTable=false}
    if(line.trim()==='---'){closeList();html+='<hr>';continue}
    if(line.match(/^\s*[-*]\s/)){if(!inList){html+='<ul>';inList=true}html+='<li>'+fmt(line.replace(/^\s*[-*]\s/,''))+'</li>';continue}
    if(line.match(/^\s*\d+\.\s/)){if(!inList){html+='<ol>';inList=true}html+='<li>'+fmt(line.replace(/^\s*\d+\.\s/,''))+'</li>';continue}
    if(line.trim()===''){closeList();continue}
    closeList();html+='<p>'+fmt(line)+'</p>';
  }
  closeList();if(inTable)html+='</tbody></table>';
  return html;
  function closeList(){if(inList){html+='</ul>';inList=false}}
}

function fmt(t){t=esc(t);
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/`(.+?)`/g,'<code>$1</code>');
  t=t.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>');
  return t}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function filterNav(){
  var q=document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.style.display=el.textContent.toLowerCase().indexOf(q)>=0?'':'none';
  });
}

buildNav();
showContent(Object.keys(memoryData)[0]);
</script>
