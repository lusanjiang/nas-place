<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--surface:#111113;--surface2:#18181b;--surface3:#1f1f23;
  --border:#27272a;--border2:#3f3f46;
  --text:#fafafa;--text2:#d4d4d8;--muted:#71717a;--dim:#52525b;
  --cyan:#06b6d4;--cyan2:#22d3ee;--cyan-dim:rgba(6,182,212,0.08);

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;

             radial-gradient(ellipse at 80% 20%,rgba(168,85,247,0.03) 0%,transparent 50%);
  pointer-events:none;z-index:0}

/* ===== Sidebar ===== */
.sidebar{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,var(--cyan),transparent 30%,transparent 70%,var(--purple));opacity:0.3}
.sidebar-header{padding:28px 24px 20px;border-bottom:1px solid var(--border);position:relative}
.sidebar-header::after{content:'';position:absolute;bottom:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,var(--cyan),var(--purple));opacity:0.4}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;
  box-shadow:0 0 20px rgba(6,182,212,0.3)}
.logo-text h1{font:600 18px/1.2 'Inter',sans-serif;letter-spacing:-0.02em}
.logo-text p{font:12px/1.4 monospace;color:var(--muted);margin-top:2px}
.status-bar{display:flex;gap:6px;margin-top:12px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.status-text{font:11px/1 monospace;color:var(--dim)}
.search-box{padding:16px 20px;position:relative}
.search-box::before{content:'⌕';position:absolute;left:32px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none}
.search-input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface2);color:var(--text);font:13px/1 'Inter',sans-serif;outline:none;transition:all 200ms}
.search-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,0.1)}
.nav-section{padding:12px 24px 6px;font:600 10px/1 monospace;color:var(--dim);
  text-transform:uppercase;letter-spacing:0.12em;display:flex;align-items:center;gap:8px}
.nav-section::after{content:'';flex:1;height:1px;background:var(--border)}
.nav-list{flex:1;overflow-y:auto;padding:4px 12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  color:var(--muted);font:13px/1.3 'Inter',sans-serif;cursor:pointer;transition:all 150ms;text-decoration:none}
.nav-item:hover{background:var(--surface2);color:var(--text2)}
.nav-item.active{background:var(--cyan-dim);color:var(--cyan2)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--cyan)}
.nav-date{font:11px/1 monospace;color:var(--dim);min-width:56px}

/* ===== Main ===== */
.main{flex:1;overflow-y:auto;position:relative;z-index:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.main-inner{max-width:860px;margin:0 auto;padding:40px 48px 80px}
.hero{margin-bottom:36px}

.hero-sub{font:14px/1.6 'Inter',sans-serif;color:var(--muted);margin-top:8px}

.stat-card:nth-child(2) .stat-val{color:var(--purple2)}

.stat-card:nth-child(4) .stat-val{color:var(--orange)}
.stat-label{font:11px/1.4 'Inter',sans-serif;color:var(--muted);margin-top:6px}

/* ===== Pretext Accordion ===== */
.accordion{margin:20px 0}
.acc-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;

.acc-section.open .acc-icon{transform:rotate(90deg)}
.acc-meta{display:flex;align-items:center;gap:8px}
.acc-metric{font:11px/1 monospace;color:var(--dim);padding:3px 8px;background:var(--surface2);border-radius:4px}
.acc-chevron{width:16px;height:16px;color:var(--dim);transition:transform 200ms ease}
.acc-section.open .acc-chevron{transform:rotate(90deg);color:var(--cyan)}
.acc-body{height:0;overflow:hidden;transition:height 250ms cubic-bezier(0.4,0,0.2,1)}
.acc-inner{padding:0 18px 16px}

// ===== Pretext-powered Accordion =====
const preparedCache = new Map();
const fontCache = new Map();

function getPrepared(text, font) {
  const key = font + '::' + text;
  if (!preparedCache.has(key)) {
    preparedCache.set(key, prepare(text, font));
  }
  return preparedCache.get(key);
}

function createAccordion(key, data) {
  const container = document.getElementById('accordionContainer');
  container.innerHTML = '';

  data.sections.forEach((section, idx) => {
    const el = document.createElement('div');
    el.className = 'acc-section' + (idx === 0 ? ' open' : '');

    const htmlContent = renderMarkdown(section.content);

    el.innerHTML = `
      <div class="acc-header" data-idx="${idx}">
        <div class="acc-title">
          <span class="acc-icon" style="background:var(--cyan-dim);color:var(--cyan)">${section.icon}</span>
          ${section.title}
        </div>
        <div class="acc-meta">
          <span class="acc-metric" data-metric="${idx}">measuring...</span>
          <svg class="acc-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 4l4 4-4 4"/>
          </svg>
        </div>
      </div>
      <div class="acc-body" data-body="${idx}">
        <div class="acc-inner content" data-content="${idx}">${htmlContent}</div>
      </div>
    `;

    container.appendChild(el);

    // Pretext measurement after render
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        measureAndUpdate(el, idx, idx === 0);
      });
    });

    // Click handler
    el.querySelector('.acc-header').addEventListener('click', () => {
      const isOpen = el.classList.contains('open');
      el.classList.toggle('open');
      measureAndUpdate(el, idx, !isOpen);
    });
  });
}

function measureAndUpdate(el, idx, open) {
  const inner = el.querySelector('.acc-inner');
  const body = el.querySelector(`[data-body="${idx}"]`);
  const metric = el.querySelector(`[data-metric="${idx}"]`);

  if (!inner || !body || !metric) return;

  // Get all text nodes for Pretext measurement
  const textEls = inner.querySelectorAll('p, li, td, th, h1, h2, h3, h4, code');
  let totalHeight = 0;
  let totalLines = 0;

  textEls.forEach(textEl => {
    const text = textEl.textContent.trim();
    if (!text) return;

    const styles = getComputedStyle(textEl);
    const font = styles.font || `${styles.fontSize}/${styles.lineHeight} ${styles.fontFamily}`;
    const lineHeight = parseFloat(styles.lineHeight) || parseFloat(styles.fontSize) * 1.5;
    const width = textEl.getBoundingClientRect().width;

    if (width > 0 && text) {
      const prepared = getPrepared(text, font);
      const result = layout(prepared, width, lineHeight);
      totalHeight += result.height;
      totalLines += result.lineCount;
    }
  });

  // Add padding for pre blocks, tables, margins
  const preBlocks = inner.querySelectorAll('pre');
  preBlocks.forEach(pre => {
    totalHeight += pre.getBoundingClientRect().height + 16;
  });
  const tables = inner.querySelectorAll('table');
  tables.forEach(table => {
    totalHeight += table.getBoundingClientRect().height + 16;
  });

  const padding = 32;
  const finalHeight = Math.ceil(totalHeight + padding);

  metric.textContent = `${totalLines} lines · ${finalHeight}px`;

  if (open) {
    body.style.height = finalHeight + 'px';
  } else {
    body.style.height = '0px';
  }
}

// ===== Markdown Renderer =====
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '', inList = false, inCode = false, inTable = false, tableHead = false;

  for (const line of lines) {
    if (line.trim().startsWith('```')) {
      if (inCode) { html += '</code></pre>'; inCode = false; }
      else { html += '<pre><code>'; inCode = true; }
      continue;
    }
    if (inCode) { html += esc(line) + '\n'; continue; }
    if (line.startsWith('### ')) { closeList(); html += '<h3>' + fmt(line.slice(4)) + '</h3>'; continue; }
    if (line.startsWith('## ')) { closeList(); html += '<h2>' + fmt(line.slice(3)) + '</h2>'; continue; }
    if (line.startsWith('# ')) { closeList(); html += '<h1>' + fmt(line.slice(2)) + '</h1>'; continue; }

    if (line.includes('|') && line.trim().startsWith('|')) {
      if (!inTable) { inTable = true; tableHead = false; html += '<table>'; }
      if (line.match(/^\|[\s\-:|]+\|$/)) { tableHead = true; continue; }
      const cells = line.split('|').filter(c => c.trim());
      if (!tableHead) {
        html += '<thead><tr>';
        cells.forEach(c => html += '<th>' + fmt(c.trim()) + '</th>');
        html += '</tr></thead><tbody>';
      } else {
        html += '<tr>';
        cells.forEach(c => html += '<td>' + fmt(c.trim()) + '</td>');
        html += '</tr>';
      }
      continue;
    } else if (inTable) { html += '</tbody></table>'; inTable = false; }

    if (line.trim() === '---') { closeList(); html += '<hr>'; continue; }
    if (line.match(/^\s*[-*]\s/)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + fmt(line.replace(/^\s*[-*]\s/, '')) + '</li>';
      continue;
    }
    if (line.match(/^\s*>\s/)) {
      closeList();
      html += '<blockquote>' + fmt(line.replace(/^\s*>\s/, '')) + '</blockquote>';
      continue;
    }
    if (line.trim() === '') { closeList(); continue; }
    closeList();
    html += '<p>' + fmt(line) + '</p>';
  }
  closeList();
  if (inTable) html += '</tbody></table>';
  return html;

  function closeList() { if (inList) { html += '</ul>'; inList = false; } }
}

function fmt(t) {
  t = esc(t);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`(.+?)`/g, '<code>$1</code>');
  t = t.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
  return t;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== Navigation =====
function buildNav() {
  const navMain = document.getElementById('navMain');
  const navArchive = document.getElementById('navArchive');

  Object.keys(memoryData).forEach((key, i) => {
    const data = memoryData[key];
    const div = document.createElement('div');
    div.className = 'nav-item' + (i === 0 ? ' active' : '');
    div.dataset.key = key;
    div.style.position = 'relative';

    if (data.date) {
      div.innerHTML = `<span class="nav-date">${data.date}</span><span>${key.replace(data.date + ' ', '')}</span>`;
      navArchive.appendChild(div);
    } else {
      div.innerHTML = `<span style="font-size:14px;opacity:0.6">${data.icon}</span><span>${key}</span>`;
      navMain.appendChild(div);
    }

    div.addEventListener('click', () => showContent(key));
  });
}

function showContent(key) {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.key === key)
  );
  const data = memoryData[key];
  document.getElementById('heroTitle').innerHTML = data.date
    ? `${key} <span class="pretext-badge" style="background:var(--cyan-dim);color:var(--cyan)">📄 归档</span>`
    : `${key} <span class="pretext-badge">⚡ Pretext Layout</span>`;
  document.getElementById('heroSub').textContent = data.date
    ? '每日记忆归档 — ' + data.sections.length + '个模块'
    : 'AI助理豆豆的长期记忆系统 — 文本高度由 Pretext 精确计算';
  document.getElementById('statsGrid').style.display = data.date ? 'none' : 'grid';
  createAccordion(key, data);
}

function filterNav() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(el =>
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none'
  );
}

// ===== Resize handler =====
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    document.querySelectorAll('.acc-section').forEach((el, idx) => {
      const isOpen = el.classList.contains('open');
      measureAndUpdate(el, idx, isOpen);
    });
  }, 150);
});

// ===== Init =====
buildNav();
showContent(Object.keys(memoryData)[0]);
</script>
