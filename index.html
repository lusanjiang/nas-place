<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>示例页面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: #0a1a3f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
.container { padding: 40px; }
h1 { font-size: 3rem; margin-bottom: 20px; color: #c8734a; }
p { font-size: 1.2rem; color: #94a3b8; margin-bottom: 12px; }
.box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; margin-top: 30px; }
</style>
</head>
<body>
<div class="container">
  <h1>🌿 示例页面</h1>
  <p>这是一个示例网页</p>
  <p>内容已替换为占位信息</p>
  <div class="box">
    <p>仅供测试使用</p>
    <p style="color:#64748b;font-size:0.9rem;margin-top:16px">2026年4月</p>
  </div>
</div>
</body>
</html>
