<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长沙天气</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--surface:#111113;--surface2:#18181b;
  --border:#27272a;--text:#fafafa;--text2:#d4d4d8;--muted:#71717a;
  --cyan:#06b6d4;--cyan2:#22d3ee;
  --blue:#3b82f6;--blue2:#60a5fa;
  --purple:#a855f7;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;
  background-image:radial-gradient(ellipse at 30% 0%,rgba(59,130,246,0.08) 0%,transparent 50%),
                   radial-gradient(ellipse at 70% 100%,rgba(6,182,212,0.06) 0%,transparent 50%)}
.container{max-width:900px;width:100%}

/* Header */
.header{text-align:center;margin-bottom:40px}
.city{font:700 42px/1.1 'Inter',sans-serif;letter-spacing:-0.03em;
  background:linear-gradient(135deg,var(--blue2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.update-time{font:12px/1 monospace;color:var(--muted);margin-top:8px}

/* Current Weather */
.current{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:36px 40px;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;position:relative;overflow:hidden}
.current::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--blue),var(--cyan))}
.current-temp{font:700 72px/1 'JetBrains Mono',monospace;color:var(--text)}
.current-temp .unit{font:300 32px/1 'Inter',sans-serif;color:var(--muted);margin-left:4px}
.current-desc{font:18px/1.4 'Inter',sans-serif;color:var(--text2);margin-top:8px}
.current-icon{font-size:72px;filter:drop-shadow(0 0 20px rgba(59,130,246,0.3));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Details */
.details{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 16px;
  text-align:center;transition:all 200ms}
.detail-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.detail-icon{font-size:24px;margin-bottom:8px}
.detail-val{font:600 20px/1 'JetBrains Mono',monospace;color:var(--cyan2)}
.detail-label{font:11px/1.4 'Inter',sans-serif;color:var(--muted);margin-top:6px}

/* Forecast */
.forecast-title{font:600 16px/1 'Inter',sans-serif;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:16px;
  display:flex;align-items:center;gap:10px}
.forecast-title::after{content:'';flex:1;height:1px;background:var(--border)}

.forecast{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.forecast-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:24px 20px;text-align:center;transition:all 200ms;position:relative;overflow:hidden}
.forecast-card:hover{border-color:rgba(6,182,212,0.3);transform:translateY(-2px)}
.forecast-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.forecast-card:nth-child(1)::before{background:linear-gradient(90deg,var(--blue),transparent)}
.forecast-card:nth-child(2)::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.forecast-card:nth-child(3)::before{background:linear-gradient(90deg,var(--purple),transparent)}
.forecast-date{font:600 14px/1 'Inter',sans-serif;color:var(--text2);margin-bottom:4px}
.forecast-week{font:11px/1 monospace;color:var(--muted);margin-bottom:16px}
.forecast-icon{font-size:40px;margin-bottom:12px}
.forecast-temp{font:600 22px/1 'JetBrains Mono',monospace}
.forecast-temp .low{color:var(--blue2)}
.forecast-temp .high{color:var(--orange)}
.forecast-desc{font:13px/1.4 'Inter',sans-serif;color:var(--muted);margin-top:8px}

/* Hourly */
.hourly-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:24px;margin-bottom:24px;overflow-x:auto}
.hourly{display:flex;gap:20px;min-width:max-content}
.hourly-item{text-align:center;min-width:60px}
.hourly-time{font:11px/1 monospace;color:var(--muted);margin-bottom:8px}
.hourly-icon{font-size:24px;margin-bottom:6px}
.hourly-temp{font:500 14px/1 'JetBrains Mono',monospace;color:var(--text2)}

/* Tips */
.tips{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;
  border-left:3px solid var(--cyan)}
.tips-title{font:600 14px/1 'Inter',sans-serif;color:var(--cyan2);margin-bottom:8px}
.tips-text{font:14px/1.7 'Inter',sans-serif;color:var(--muted)}

/* Footer */
.footer{text-align:center;margin-top:32px;font:11px/1 monospace;color:var(--dim)}
.footer a{color:var(--cyan);text-decoration:none}

/* Responsive */
@media(max-width:640px){
  .current{flex-direction:column;text-align:center;gap:20px;padding:28px}
  .details{grid-template-columns:repeat(2,1fr)}
  .forecast{grid-template-columns:1fr}
  .city{font-size:32px}
  .current-temp{font-size:56px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="city">长沙天气</div>
    <div class="update-time" id="updateTime">数据加载中...</div>
  </div>

  <div class="current">
    <div>
      <div class="current-temp" id="currentTemp">--<span class="unit">°C</span></div>
      <div class="current-desc" id="currentDesc">--</div>
    </div>
    <div class="current-icon" id="currentIcon">🌤️</div>
  </div>

  <div class="details">
    <div class="detail-card">
      <div class="detail-icon">💧</div>
      <div class="detail-val" id="humidity">--%</div>
      <div class="detail-label">湿度</div>
    </div>
    <div class="detail-card">
      <div class="detail-icon">💨</div>
      <div class="detail-val" id="wind">-- km/h</div>
      <div class="detail-label">风速</div>
    </div>
    <div class="detail-card">
      <div class="detail-icon">🌡️</div>
      <div class="detail-val" id="feelsLike">--°C</div>
      <div class="detail-label">体感温度</div>
    </div>
    <div class="detail-card">
      <div class="detail-icon">👁️</div>
      <div class="detail-val" id="visibility">-- km</div>
      <div class="detail-label">能见度</div>
    </div>
  </div>

  <div class="forecast-title">未来三天预报</div>
  <div class="forecast" id="forecastContainer"></div>

  <div class="forecast-title">今日逐时</div>
  <div class="hourly-wrap">
    <div class="hourly" id="hourlyContainer"></div>
  </div>

  <div class="tips" id="tipsBox">
    <div class="tips-title">出行建议</div>
    <div class="tips-text" id="tipsText">加载中...</div>
  </div>

  <div class="footer">
    数据来源: wttr.in | 由豆豆自动更新 | <a href="https://lusanjiang.github.io/nas-place/">记忆网页</a>
  </div>
</div>

<script>
const weatherIcons = {
  'Clear':'☀️','Sunny':'☀️','Partly cloudy':'⛅','Cloudy':'☁️',
  'Overcast':'🌥️','Mist':'🌫️','Fog':'🌫️',
  'Light rain':'🌦️','Moderate rain':'🌧️','Heavy rain':'🌧️',
  'Patchy rain nearby':'🌦️','Light drizzle':'🌦️',
  'Light snow':'🌨️','Moderate snow':'🌨️','Heavy snow':'❄️',
  'Thunderstorm':'⛈️','Thunder':'⛈️'
};

function getIcon(desc) {
  for (const [k,v] of Object.entries(weatherIcons)) {
    if (desc.includes(k) || k.includes(desc)) return v;
  }
  return '🌤️';
}

function getWeekday(dateStr) {
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  return days[new Date(dateStr).getDay()];
}

function getTips(temp, desc, humidity) {
  const tips = [];
  if (temp < 10) tips.push('气温较低，注意保暖，建议穿厚外套');
  else if (temp < 20) tips.push('气温适中，建议穿长袖或薄外套');
  else if (temp > 30) tips.push('天气炎热，注意防暑降温，多喝水');

  if (desc.includes('雨')) tips.push('有降雨，出门记得带伞');
  if (desc.includes('雪')) tips.push('有降雪，注意路面湿滑');
  if (humidity > 80) tips.push('湿度较高，注意防潮');

  if (tips.length === 0) tips.push('天气不错，适合外出活动');
  return tips.join('。');
}

async function loadWeather() {
  try {
    const resp = await fetch('https://wttr.in/长沙?format=j1');
    const data = await resp.json();
    const cur = data.current_condition[0];
    const today = data.weather[0];
    const now = new Date();

    // Current
    document.getElementById('currentTemp').innerHTML = cur.temp_C + '<span class="unit">°C</span>';
    document.getElementById('currentDesc').textContent = cur.weatherDesc[0].value;
    document.getElementById('currentIcon').textContent = getIcon(cur.weatherDesc[0].value);
    document.getElementById('humidity').textContent = cur.humidity + '%';
    document.getElementById('wind').textContent = cur.windspeedKmph + ' km/h';
    document.getElementById('feelsLike').textContent = cur.FeelsLikeC + '°C';
    document.getElementById('visibility').textContent = cur.visibility + ' km';
    document.getElementById('updateTime').textContent =
      '更新于 ' + now.toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'}) + ' | 实时数据';

    // Forecast
    const fc = document.getElementById('forecastContainer');
    fc.innerHTML = '';
    data.weather.forEach((day, i) => {
      const desc = day.hourly[4].weatherDesc[0].value;
      fc.innerHTML += `
        <div class="forecast-card">
          <div class="forecast-date">${day.date}</div>
          <div class="forecast-week">${getWeekday(day.date)}</div>
          <div class="forecast-icon">${getIcon(desc)}</div>
          <div class="forecast-temp">
            <span class="low">${day.mintempC}°</span>
            <span style="color:var(--dim);margin:0 4px">/</span>
            <span class="high">${day.maxtempC}°</span>
          </div>
          <div class="forecast-desc">${desc}</div>
        </div>`;
    });

    // Hourly
    const hc = document.getElementById('hourlyContainer');
    hc.innerHTML = '';
    today.hourly.forEach(h => {
      const hour = parseInt(h.time) / 100;
      const label = hour < 10 ? '0' + hour + ':00' : hour + ':00';
      hc.innerHTML += `
        <div class="hourly-item">
          <div class="hourly-time">${label}</div>
          <div class="hourly-icon">${getIcon(h.weatherDesc[0].value)}</div>
          <div class="hourly-temp">${h.tempC}°</div>
        </div>`;
    });

    // Tips
    document.getElementById('tipsText').textContent =
      getTips(parseInt(cur.temp_C), cur.weatherDesc[0].value, parseInt(cur.humidity));

  } catch(e) {
    console.error('Weather load failed:', e);
    // Fallback static data
    document.getElementById('currentTemp').innerHTML = '17<span class="unit">°C</span>';
    document.getElementById('currentDesc').textContent = '多云';
    document.getElementById('humidity').textContent = '83%';
    document.getElementById('wind').textContent = '13 km/h';
    document.getElementById('feelsLike').textContent = '15°C';
    document.getElementById('visibility').textContent = '10 km';
    document.getElementById('updateTime').textContent = '静态数据 (API暂不可用)';

    const fc = document.getElementById('forecastContainer');
    const staticDays = [
      {date:'2026-03-31', low:12, high:13, desc:'小雨'},
      {date:'2026-04-01', low:11, high:21, desc:'多云'},
      {date:'2026-04-02', low:15, high:19, desc:'阵雨'}
    ];
    staticDays.forEach(day => {
      fc.innerHTML += `
        <div class="forecast-card">
          <div class="forecast-date">${day.date}</div>
          <div class="forecast-week">${getWeekday(day.date)}</div>
          <div class="forecast-icon">${getIcon(day.desc)}</div>
          <div class="forecast-temp">
            <span class="low">${day.low}°</span>
            <span style="color:var(--dim);margin:0 4px">/</span>
            <span class="high">${day.high}°</span>
          </div>
          <div class="forecast-desc">${day.desc}</div>
        </div>`;
    });

    document.getElementById('tipsText').textContent =
      '今天有小雨，出门带伞。明天多云转晴，气温回升。';
  }
}

loadWeather();
</script>
</body>
</html>
