// Navigation
function buildNav() {
  var navMain = document.getElementById('navMain');
  var navArchive = document.getElementById('navArchive');
  var keys = Object.keys(memoryData);
  
  keys.forEach(function(key, i) {
    var div = document.createElement('div');
    div.className = 'nav-item' + (i === 0 ? ' active' : '');
    div.textContent = key;
    div.dataset.key = key;
    div.onclick = function() { showContent(key); };
    
    if (key.indexOf('2026-') === 0 || key.indexOf('20') === 0) {
      var dateMatch = key.match(/(\d{4}-\d{2}-\d{2})/);
      if (dateMatch) {
        div.innerHTML = '<span class="date">' + dateMatch[1] + '</span>' + key.replace(dateMatch[0] + ' ', '');
      }
      navArchive.appendChild(div);
    } else {
      navMain.appendChild(div);
    }
  });
}

function showContent(key) {
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.key === key);
  });
  
  // Render markdown
  var md = memoryData[key];
  var html = renderMarkdown(md);
  
  var isArchive = key.indexOf('2026-') === 0;
  var tagClass = isArchive ? 'tag-archive' : 'tag-memory';
  var tagText = isArchive ? '归档' : '长期记忆';
  
  document.getElementById('contentArea').innerHTML = html;
  document.querySelector('.main-header h2').innerHTML = key + ' <span class="tag ' + tagClass + '">' + tagText + '</span>';
}

function renderMarkdown(md) {
  var lines = md.split('\n');
  var html = '';
  var inList = false;
  var inCode = false;
  var inTable = false;
  var tableStarted = false;
  
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    
    // Code blocks
    if (line.trim().startsWith('```')) {
      if (inCode) { html += '</code></pre>'; inCode = false; }
      else { html += '<pre><code>'; inCode = true; }
      continue;
    }
    if (inCode) { html += escapeHtml(line) + '\n'; continue; }
    
    // Headers
    if (line.startsWith('# ')) { closeList(); html += '<h1>' + inlineFormat(line.slice(2)) + '</h1>'; continue; }
    if (line.startsWith('## ')) { closeList(); html += '<h2>' + inlineFormat(line.slice(3)) + '</h2>'; continue; }
    if (line.startsWith('### ')) { closeList(); html += '<h3>' + inlineFormat(line.slice(4)) + '</h3>'; continue; }
    if (line.startsWith('#### ')) { closeList(); html += '<h4>' + inlineFormat(line.slice(5)) + '</h4>'; continue; }
    
    // Table
    if (line.includes('|') && line.trim().startsWith('|')) {
      if (!inTable) {
        inTable = true;
        tableStarted = false;
        html += '<table>';
      }
      if (line.match(/^\|[\s\-:|]+\|$/)) { tableStarted = true; continue; }
      var cells = line.split('|').filter(function(c) { return c.trim() !== ''; });
      if (!tableStarted) {
        html += '<thead><tr>';
        cells.forEach(function(c) { html += '<th>' + inlineFormat(c.trim()) + '</th>'; });
        html += '</tr></thead><tbody>';
      } else {
        html += '<tr>';
        cells.forEach(function(c) { html += '<td>' + inlineFormat(c.trim()) + '</td>'; });
        html += '</tr>';
      }
      continue;
    } else if (inTable) {
      html += '</tbody></table>';
      inTable = false;
    }
    
    // HR
    if (line.trim() === '---') { closeList(); html += '<hr>'; continue; }
    
    // List items
    if (line.match(/^\s*[-*]\s/)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + inlineFormat(line.replace(/^\s*[-*]\s/, '')) + '</li>';
      continue;
    }
    if (line.match(/^\s*\d+\.\s/)) {
      if (!inList) { html += '<ol>'; inList = true; }
      html += '<li>' + inlineFormat(line.replace(/^\s*\d+\.\s/, '')) + '</li>';
      continue;
    }
    
    // Empty line
    if (line.trim() === '') { closeList(); continue; }
    
    // Paragraph
    closeList();
    html += '<p>' + inlineFormat(line) + '</p>';
  }
  
  closeList();
  if (inTable) html += '</tbody></table>';
  
  return html;
  
  function closeList() {
    if (inList) { html += '</ul>'; inList = false; }
  }
}

function inlineFormat(text) {
  text = escapeHtml(text);
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/`(.+?)`/g, '<code>$1</code>');
  text = text.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
  return text;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filterNav() {
  var q = document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
