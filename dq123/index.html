<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电气资料检索 · dq123</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff; min-height: 100vh;
        }
        .splash-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-screen.fade-out { opacity: 0; pointer-events: none; }
        .splash-title {
            font-family: 'ZCOOL XiaoWei', serif; font-size: 3em;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;
        }
        .splash-subtitle { color: #888; font-size: 1.1em; }
        .splash-author { color: #666; margin-top: 30px; font-size: 0.9em; }
        .container {
            max-width: 1000px; margin: 0 auto; padding: 20px;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .container.fade-in { opacity: 1; }
        header { text-align: center; padding: 30px 0; }
        h1 {
            font-family: 'ZCOOL XiaoWei', serif; font-size: 2.2em;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tagline { color: #888; margin-top: 8px; font-size: 0.95em; letter-spacing: 1px; }
        .search-box {
            display: flex; gap: 10px; max-width: 600px; margin: 30px auto;
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            flex: 1; background: transparent; border: none; color: #fff;
            font-size: 1.1em; padding: 12px 16px; outline: none;
        }
        .search-box input::placeholder { color: #666; }
        .search-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none; color: #fff; padding: 12px 24px; border-radius: 8px;
            cursor: pointer; font-size: 1em; transition: opacity 0.3s;
        }
        .search-btn:hover { opacity: 0.8; }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats-bar {
            display: flex; justify-content: center; gap: 40px;
            padding: 20px 0; margin-bottom: 20px;
        }
        .stat { text-align: center; }
        .stat-num { font-size: 2em; font-weight: bold; color: #00d2ff; }
        .stat-label { color: #888; font-size: 0.9em; margin-top: 4px; }
        .loading-spinner {
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 0; color: #888;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d2ff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hint-message { text-align: center; padding: 60px 0; color: #888; }
        .hint-icon { font-size: 3em; margin-bottom: 16px; }
        /* 系列卡片 */
        .series-card {
            background: rgba(255,255,255,0.05); border-radius: 12px;
            margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden; transition: border-color 0.3s;
        }
        .series-card:hover { border-color: rgba(0,210,255,0.3); }
        .series-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; cursor: pointer;
        }
        .series-header:hover { background: rgba(255,255,255,0.03); }
        .series-name {
            font-size: 1.1em; font-weight: 600;
            display: flex; align-items: center; gap: 10px;
        }
        .series-count {
            background: rgba(0,210,255,0.15); color: #00d2ff;
            padding: 2px 10px; border-radius: 12px; font-size: 0.85em;
        }
        .series-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75em; font-weight: normal;
        }
        .badge-tengen { background: rgba(255,107,53,0.2); color: #ff6b35; }
        .badge-schneider { background: rgba(69,196,83,0.2); color: #45c453; }
        .badge-abb { background: rgba(255,68,68,0.2); color: #ff4444; }
        .badge-other { background: rgba(150,150,150,0.2); color: #999; }
        .expand-icon {
            transition: transform 0.3s; color: #666; font-size: 1.2em;
        }
        .expand-icon.expanded { transform: rotate(180deg); }
        .series-body {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
            border-top: 1px solid transparent;
        }
        .series-body.expanded {
            max-height: 3000px; border-top-color: rgba(255,255,255,0.05);
        }
        .pdf-list { padding: 12px 20px; }
        .pdf-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; margin-bottom: 6px; border-radius: 8px;
            background: rgba(255,255,255,0.03); transition: background 0.2s;
            text-decoration: none; color: #fff;
        }
        .pdf-item:hover { background: rgba(0,210,255,0.08); }
        .pdf-icon { font-size: 1.4em; flex-shrink: 0; }
        .pdf-info { flex: 1; min-width: 0; }
        .pdf-name {
            font-size: 0.95em; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .pdf-size { color: #888; font-size: 0.8em; margin-top: 2px; }
        .pdf-download {
            background: rgba(0,210,255,0.15); color: #00d2ff;
            padding: 6px 14px; border-radius: 6px; font-size: 0.85em;
            flex-shrink: 0; transition: background 0.2s;
        }
        .pdf-item:hover .pdf-download { background: rgba(0,210,255,0.25); }
        .no-samples { padding: 20px; text-align: center; color: #666; }
        /* 产品型号列表 */
        .model-list { padding: 12px 20px; }
        .model-item {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 14px; margin-bottom: 4px; border-radius: 8px;
            background: rgba(255,255,255,0.02);
        }
        .model-text { font-size: 0.9em; flex: 1; }
        .model-price { color: #ff6b6b; font-size: 0.85em; font-weight: 600; }
        .model-price.na { color: #555; font-weight: normal; }
        .footer {
            text-align: center; padding: 40px 0 20px; color: #555; font-size: 0.85em;
        }
        .footer a { color: #3a7bd5; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .log {
            margin: 10px auto; max-width: 600px; padding: 8px 14px;
            background: rgba(0,0,0,0.3); border-radius: 6px;
            font-family: monospace; font-size: 0.7em; color: #0f0;
            max-height: 80px; overflow-y: auto; display: none;
        }
    </style>
</head>
<body>
    <div class="splash-screen" id="splash">
        <div class="splash-title">电气图书馆</div>
        <div class="splash-subtitle">Electrical Selection Data Retrieval System</div>
        <div class="splash-author">作者：TENGEN-LUSANJIANG</div>
    </div>

    <div class="container" id="mainContainer">
        <header>
            <h1>天正电气 · 可信赖 更美好</h1>
            <p class="tagline">Electrical Selection Data Retrieval System</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入型号或关键词，如 CM5、NXM、TGM1N..." autocomplete="off">
            <button class="search-btn" id="searchBtn" onclick="handleSearch()">检索</button>
        </div>

        <div class="log" id="log"></div>

        <div class="stats-bar" id="statsBar" style="display:none;">
            <div class="stat">
                <div class="stat-num" id="statSeries">0</div>
                <div class="stat-label">产品系列</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statProducts">0</div>
                <div class="stat-label">产品型号</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statPDFs">0</div>
                <div class="stat-label">PDF样本</div>
            </div>
        </div>

        <div id="results">
            <div class="hint-message">
                <div class="hint-icon">🔍</div>
                <p>输入型号开始检索电气资料</p>
                <p style="margin-top:10px; font-size:0.9em;">支持产品样本、CAD图块、3D模型、认证证书等</p>
            </div>
        </div>

        <div class="footer">
            <p>数据来源：<a href="https://www.dq123.com" target="_blank">dq123.com 电天下</a> · 仅供学习交流使用</p>
        </div>
    </div>

    <script>
        // 开机画面
        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
            document.getElementById('mainContainer').classList.add('fade-in');
            document.getElementById('searchInput').focus();
        }, 1500);

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const statsBar = document.getElementById('statsBar');
        const searchBtn = document.getElementById('searchBtn');
        const logDiv = document.getElementById('log');
        const OSS_BASE = 'https://datafiles.oss-cn-shanghai.aliyuncs.com/dx2_data/proddata/sp/';

        // CORS代理列表（按优先级）
        const CORS_PROXIES = [
            url => url,  // 先尝试直接访问
            url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
            url => 'https://corsproxy.io/?' + encodeURIComponent(url),
        ];

        function log(msg) {
            logDiv.style.display = 'block';
            logDiv.innerHTML += '[' + new Date().toLocaleTimeString() + '] ' + msg + '<br>';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // JSONP 调用工具
        function jsonpCall(url) {
            return new Promise((resolve, reject) => {
                const ts = Date.now();
                const cbName = `cb_${ts}`;
                window[cbName] = function(data) {
                    delete window[cbName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = url + (url.includes('?') ? '&' : '?') + `callback=${cbName}`;
                script.onerror = () => { reject(new Error('JSONP failed')); };
                document.head.appendChild(script);
                setTimeout(() => { reject(new Error('Timeout')); }, 15000);
            });
        }

        // 解码 dq123 加密数据
        function decodeDQ123(encoded) {
            const s = encoded.substring(20).replace(/#/g, '+');
            return JSON.parse(atob(s));
        }

        // 去HTML标签
        function stripHtml(s) {
            return (s || '').replace(/<[^>]+>/g, '').replace(/<\/?\w+/g, '').trim();
        }

        // 搜索产品（sprice API）
        async function searchProducts(keyword) {
            const ts = Date.now();
            const raw = await jsonpCall(
                `https://dian.dq123.com/open/sprice?v=${ts}&fid=&sid=&kw=${encodeURIComponent(keyword)}&pi=1`
            );
            return decodeDQ123(raw);
        }

        // 获取系列样本数据（通过CORS代理）
        async function getSeriesSamples(seriesId) {
            const path = `4/z_p/${seriesId}.jss`;
            const b64 = btoa(path).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
            const ts = Date.now();
            const directUrl = `https://dian.dq123.com/electricData?v=${b64}&t=${ts}`;

            // 尝试多个代理
            for (const makeUrl of CORS_PROXIES) {
                try {
                    const url = makeUrl(directUrl);
                    const resp = await fetch(url);
                    if (!resp.ok) continue;

                    const buffer = await resp.arrayBuffer();
                    const zip = await JSZip.loadAsync(buffer);
                    const jsFile = Object.keys(zip.files).find(n => n.endsWith('.js'));
                    if (!jsFile) continue;

                    const content = await zip.files[jsFile].async('string');
                    const data = JSON.parse(content);
                    return data.g || [];  // g = SampleList
                } catch (e) {
                    log(`代理失败: ${e.message}`);
                    continue;
                }
            }
            return [];
        }

        // 判断厂家徽章
        function getFactoryBadge(name) {
            if (!name) return '';
            if (name.includes('天正')) return '<span class="series-badge badge-tengen">天正</span>';
            if (name.includes('施耐德')) return '<span class="series-badge badge-schneider">施耐德</span>';
            if (name.includes('ABB')) return '<span class="series-badge badge-abb">ABB</span>';
            return '<span class="series-badge badge-other">' + esc(name) + '</span>';
        }

        // 主搜索流程
        async function handleSearch() {
            const keyword = searchInput.value.trim();
            if (!keyword) return;

            searchBtn.disabled = true;
            logDiv.innerHTML = '';
            logDiv.style.display = 'none';
            resultsDiv.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>正在检索: ${keyword}</p>
                    <p style="margin-top:8px; font-size:0.85em; color:#666;">搜索产品系列并加载样本数据...</p>
                </div>
            `;
            statsBar.style.display = 'none';

            try {
                // 1. 搜索产品
                log('搜索: ' + keyword);
                const searchResult = await searchProducts(keyword);
                const products = searchResult.data || [];
                const remark = searchResult.remark || {};
                log('找到: ' + products.length + ' 条产品');

                if (products.length === 0) {
                    resultsDiv.innerHTML = `
                        <div class="hint-message">
                            <div class="hint-icon">😅</div>
                            <p>未找到 "${keyword}" 相关资料</p>
                            <p style="margin-top:10px; font-size:0.9em;">试试其他关键词</p>
                        </div>
                    `;
                    searchBtn.disabled = false;
                    return;
                }

                // 2. 提取系列信息
                const seriesMap = {};
                const factoryMap = {};
                products.forEach(p => {
                    const sid = p.F_ProductLineID;
                    const fid = p.F_ManufactoryID;
                    if (sid && !seriesMap[sid]) {
                        const seriesInfo = (remark.F_ProductLineID || []).find(s => s.Key == sid);
                        seriesMap[sid] = {
                            id: sid,
                            fid: fid,
                            name: seriesInfo ? seriesInfo.Name : `系列 #${sid}`,
                            count: seriesInfo ? seriesInfo.Value : 0,
                            products: []
                        };
                    }
                    if (sid) seriesMap[sid].products.push(p);
                });

                // 获取厂家名映射
                const factoryIds = [...new Set(Object.values(seriesMap).map(s => s.fid))];
                log('厂家ID: ' + factoryIds.join(', '));

                // 通过remark获取厂家名
                const factoryRemark = remark.F_ManufactoryID || [];
                factoryIds.forEach(fid => {
                    const info = factoryRemark.find(f => f.Key == fid);
                    factoryMap[fid] = info ? info.Name : `厂家 #${fid}`;
                });

                const seriesList = Object.values(seriesMap).sort((a, b) => b.count - a.count);
                log('系列数: ' + seriesList.length);

                // 3. 更新统计
                document.getElementById('statSeries').textContent = seriesList.length;
                document.getElementById('statProducts').textContent = products.length;
                statsBar.style.display = 'flex';

                // 4. 显示系列列表
                resultsDiv.innerHTML = seriesList.map(s => `
                    <div class="series-card" id="series-${s.id}">
                        <div class="series-header" onclick="toggleSeries(${s.id})">
                            <div class="series-name">
                                ${getFactoryBadge(factoryMap[s.fid] || '')}
                                <span>${esc(s.name)}</span>
                                <span class="series-count">${s.count} 产品</span>
                            </div>
                            <span class="expand-icon" id="expand-${s.id}">▼</span>
                        </div>
                        <div class="series-body" id="body-${s.id}">
                            <div class="pdf-list" id="pdfs-${s.id}">
                                <div class="loading-spinner" style="padding:20px 0;">
                                    <div class="spinner" style="width:24px;height:24px;"></div>
                                    <p style="font-size:0.85em;">加载样本数据...</p>
                                </div>
                            </div>
                            <div class="model-list" id="models-${s.id}"></div>
                        </div>
                    </div>
                `).join('');

                // 5. 显示每个系列的产品型号
                seriesList.forEach(s => {
                    const modelDiv = document.getElementById(`models-${s.id}`);
                    if (!modelDiv) return;
                    const modelHtml = s.products.slice(0, 20).map(p => {
                        const model = stripHtml(p.model || '');
                        const price = p.price ? `<span class="model-price">¥${p.price}</span>` : '<span class="model-price na">暂无报价</span>';
                        return `<div class="model-item"><span class="model-text">${esc(model)}</span>${price}</div>`;
                    }).join('');
                    modelDiv.innerHTML = modelHtml;
                });

                // 6. 异步加载每个系列的样本数据
                let totalPDFs = 0;
                const loadPromises = seriesList.map(async (s) => {
                    try {
                        log('加载系列 #' + s.id + ' 样本...');
                        const samples = await getSeriesSamples(s.id);
                        const pdfList = document.getElementById(`pdfs-${s.id}`);
                        if (!pdfList) return;

                        if (samples.length > 0) {
                            totalPDFs += samples.length;
                            document.getElementById('statPDFs').textContent = totalPDFs;
                            pdfList.innerHTML = samples.map(samp => `
                                <a class="pdf-item" href="${OSS_BASE}${samp.bk}/${samp.bl}" target="_blank" rel="noopener">
                                    <span class="pdf-icon">📄</span>
                                    <div class="pdf-info">
                                        <div class="pdf-name">${esc(samp.bl)}</div>
                                        <div class="pdf-size">${(samp.bm).toFixed(1)} MB</div>
                                    </div>
                                    <span class="pdf-download">下载</span>
                                </a>
                            `).join('');
                            log('系列 #' + s.id + ': ' + samples.length + ' 个样本');
                        } else {
                            pdfList.innerHTML = '<div class="no-samples">暂无样本数据</div>';
                        }
                    } catch (e) {
                        const pdfList = document.getElementById(`pdfs-${s.id}`);
                        if (pdfList) pdfList.innerHTML = '<div class="no-samples">加载失败</div>';
                        log('系列 #' + s.id + ' 加载失败: ' + e.message);
                    }
                });

                // 更新 PDF 总数
                setTimeout(() => {
                    document.getElementById('statPDFs').textContent = totalPDFs;
                }, 5000);

            } catch (error) {
                console.error('搜索失败:', error);
                resultsDiv.innerHTML = `
                    <div class="hint-message">
                        <div class="hint-icon">❌</div>
                        <p>搜索失败，请稍后重试</p>
                        <p style="margin-top:8px; font-size:0.85em; color:#666;">${error.message}</p>
                    </div>
                `;
            }

            searchBtn.disabled = false;
        }

        // 展开/折叠系列
        function toggleSeries(id) {
            const body = document.getElementById(`body-${id}`);
            const icon = document.getElementById(`expand-${id}`);
            body.classList.toggle('expanded');
            icon.classList.toggle('expanded');
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // 回车搜索
        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });
    </script>
</body>
</html>
