<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电气资料检索 · dq123</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);color:#fff;min-height:100vh}
        .splash{position:fixed;inset:0;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
        .splash.out{opacity:0;pointer-events:none}
        .splash h1{font-family:'ZCOOL XiaoWei',serif;font-size:3em;background:linear-gradient(45deg,#00d2ff,#3a7bd5,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
        .splash p{color:#888;font-size:1.1em}
        .splash small{color:#666;margin-top:30px;font-size:.9em}
        .wrap{max-width:1000px;margin:0 auto;padding:20px;opacity:0;transition:opacity .5s}
        .wrap.show{opacity:1}
        header{text-align:center;padding:30px 0}
        header h2{font-family:'ZCOOL XiaoWei',serif;font-size:2.2em;background:linear-gradient(45deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        header p{color:#888;margin-top:8px;font-size:.95em;letter-spacing:1px}
        .search{display:flex;gap:10px;max-width:600px;margin:30px auto;background:rgba(255,255,255,.05);border-radius:12px;padding:8px;border:1px solid rgba(255,255,255,.1)}
        .search input{flex:1;background:transparent;border:none;color:#fff;font-size:1.1em;padding:12px 16px;outline:none}
        .search input::placeholder{color:#666}
        .search button{background:linear-gradient(45deg,#00d2ff,#3a7bd5);border:none;color:#fff;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:1em;transition:opacity .3s}
        .search button:hover{opacity:.8}
        .search button:disabled{opacity:.5;cursor:not-allowed}
        .stats{display:flex;justify-content:center;gap:40px;padding:20px 0;margin-bottom:20px}
        .stat{text-align:center}
        .stat b{font-size:2em;color:#00d2ff}
        .stat span{color:#888;font-size:.9em;margin-top:4px;display:block}
        .loading{display:flex;flex-direction:column;align-items:center;padding:60px 0;color:#888}
        .spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#00d2ff;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:16px}
        @keyframes sp{to{transform:rotate(360deg)}}
        .hint{text-align:center;padding:60px 0;color:#888}
        .hint .ic{font-size:3em;margin-bottom:16px}
        .card{background:rgba(255,255,255,.05);border-radius:12px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08);overflow:hidden;transition:border-color .3s}
        .card:hover{border-color:rgba(0,210,255,.3)}
        .card-hd{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer}
        .card-hd:hover{background:rgba(255,255,255,.03)}
        .card-name{font-size:1.1em;font-weight:600;display:flex;align-items:center;gap:10px}
        .cnt{background:rgba(0,210,255,.15);color:#00d2ff;padding:2px 10px;border-radius:12px;font-size:.85em}
        .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em}
        .b-tg{background:rgba(255,107,53,.2);color:#ff6b35}
        .b-sc{background:rgba(69,196,83,.2);color:#45c453}
        .b-abb{background:rgba(255,68,68,.2);color:#ff4444}
        .b-ot{background:rgba(150,150,150,.2);color:#999}
        .exp{transition:transform .3s;color:#666;font-size:1.2em}
        .exp.on{transform:rotate(180deg)}
        .card-bd{max-height:0;overflow:hidden;transition:max-height .4s;border-top:1px solid transparent}
        .card-bd.open{max-height:3000px;border-top-color:rgba(255,255,255,.05)}
        .pdf-list{padding:12px 20px}
        .pdf{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:6px;border-radius:8px;background:rgba(255,255,255,.03);transition:background .2s;text-decoration:none;color:#fff}
        .pdf:hover{background:rgba(0,210,255,.08)}
        .pdf .ic{font-size:1.4em;flex-shrink:0}
        .pdf .info{flex:1;min-width:0}
        .pdf .nm{font-size:.95em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .pdf .sz{color:#888;font-size:.8em;margin-top:2px}
        .pdf .dl{background:rgba(0,210,255,.15);color:#00d2ff;padding:6px 14px;border-radius:6px;font-size:.85em;flex-shrink:0;transition:background .2s}
        .pdf:hover .dl{background:rgba(0,210,255,.25)}
        .no-pdf{padding:20px;text-align:center;color:#666}
        .mdl{padding:12px 20px}
        .mi{display:flex;align-items:center;gap:12px;padding:8px 14px;margin-bottom:4px;border-radius:8px;background:rgba(255,255,255,.02)}
        .mi span:first-child{font-size:.9em;flex:1}
        .mi .pr{color:#ff6b6b;font-size:.85em;font-weight:600}
        .mi .pr.na{color:#555;font-weight:normal}
        footer{text-align:center;padding:40px 0 20px;color:#555;font-size:.85em}
        footer a{color:#3a7bd5;text-decoration:none}
    </style>
</head>
<body>
<div class="splash" id="splash">
    <h1>电气图书馆</h1>
    <p>Electrical Selection Data Retrieval System</p>
    <small>作者：TENGEN-LUSANJIANG</small>
</div>
<div class="wrap" id="main">
    <header>
        <h2>天正电气 · 可信赖 更美好</h2>
        <p>Electrical Selection Data Retrieval System</p>
    </header>
    <div class="search">
        <input id="kw" type="text" placeholder="输入型号或关键词，如 CM5、NXM、TGM1N..." autocomplete="off">
        <button id="btn" onclick="doSearch()">检索</button>
    </div>
    <div class="stats" id="stats" style="display:none">
        <div class="stat"><b id="s1">0</b><span>产品系列</span></div>
        <div class="stat"><b id="s2">0</b><span>产品型号</span></div>
        <div class="stat"><b id="s3">0</b><span>PDF样本</span></div>
    </div>
    <div id="results">
        <div class="hint"><div class="ic">🔍</div><p>输入型号开始检索电气资料</p><p style="margin-top:10px;font-size:.9em">支持产品样本、CAD图块、3D模型、认证证书等</p></div>
    </div>
    <footer><p>数据来源：<a href="https://www.dq123.com" target="_blank">dq123.com 电天下</a> · 仅供学习交流使用</p></footer>
</div>

<script>
setTimeout(()=>{document.getElementById('splash').classList.add('out');document.getElementById('main').classList.add('show');document.getElementById('kw').focus()},1500);

const OSS='https://datafiles.oss-cn-shanghai.aliyuncs.com/dx2_data/proddata/sp/';
let samplesCache=null;

async function loadSamples(){
    if(samplesCache)return samplesCache;
    try{const r=await fetch('./samples_data.json');if(r.ok){samplesCache=await r.json();return samplesCache}}catch(e){}
    return {};
}

function jsonp(url){return new Promise((ok,fail)=>{const cb='c_'+Date.now();const s=document.createElement('script');window[cb]=d=>{delete window[cb];s.remove();ok(d)};s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;s.onerror=()=>{s.remove();fail(new Error('JSONP failed'))};document.head.appendChild(s);setTimeout(()=>fail(new Error('Timeout')),15000)})}
function dec(enc){return JSON.parse(atob(enc.substring(20).replace(/#/g,'+')))}
function strip(s){return(s||'').replace(/<[^>]+>/g,'').replace(/<\/?\w+/g,'').trim()}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function badge(name){if(!name)return '';if(name.includes('天正'))return '<span class="badge b-tg">天正</span>';if(name.includes('施耐德'))return '<span class="badge b-sc">施耐德</span>';if(name.includes('ABB'))return '<span class="badge b-abb">ABB</span>';return '<span class="badge b-ot">'+esc(name)+'</span>'}

async function doSearch(){
    const kw=document.getElementById('kw').value.trim();
    if(!kw)return;
    const btn=document.getElementById('btn');btn.disabled=true;
    document.getElementById('results').innerHTML='<div class="loading"><div class="spin"></div><p>正在检索: '+esc(kw)+'</p></div>';
    document.getElementById('stats').style.display='none';

    try{
        const samples=await loadSamples();
        const raw=await jsonp('https://dian.dq123.com/open/sprice?v='+Date.now()+'&fid=&sid=&kw='+encodeURIComponent(kw)+'&pi=1');
        const data=dec(raw);
        const products=data.data||[];
        const remark=data.remark||{};

        if(!products.length){
            document.getElementById('results').innerHTML='<div class="hint"><div class="ic">😅</div><p>未找到 "'+esc(kw)+'" 相关资料</p><p style="margin-top:10px;font-size:.9em">试试其他关键词</p></div>';
            btn.disabled=false;return;
        }

        const sm={};
        products.forEach(p=>{
            const sid=p.F_ProductLineID,fid=p.F_ManufactoryID;
            if(sid&&!sm[sid]){const si=(remark.F_ProductLineID||[]).find(s=>s.Key==sid);sm[sid]={id:sid,fid,name:si?si.Name:'系列 #'+sid,count:si?si.Value:0,products:[]}}
            if(sid)sm[sid].products.push(p);
        });

        const fm={};
        const fr=remark.F_ManufactoryID||[];
        Object.values(sm).forEach(s=>{const fi=fr.find(f=>f.Key==s.fid);fm[s.fid]=fi?fi.Name:'厂家 #'+s.fid});

        const sl=Object.values(sm).sort((a,b)=>b.count-a.count);
        document.getElementById('s1').textContent=sl.length;
        document.getElementById('s2').textContent=products.length;
        document.getElementById('stats').style.display='flex';

        let totalPdf=0;
        document.getElementById('results').innerHTML=sl.map(s=>{
            const samp=samples[String(s.id)];
            let pdfHtml='';
            if(samp&&samp.samples&&samp.samples.length>0){
                totalPdf+=samp.samples.length;
                pdfHtml=samp.samples.map(p=>'<a class="pdf" href="'+OSS+p.bk+'/'+encodeURIComponent(p.bl)+'" target="_blank"><span class="ic">📄</span><div class="info"><div class="nm">'+esc(p.bl)+'</div><div class="sz">'+p.bm+' MB</div></div><span class="dl">下载</span></a>').join('');
            }else{pdfHtml='<div class="no-pdf">暂无样本数据</div>'}

            const mdl=s.products.slice(0,20).map(p=>{const m=strip(p.model||'');const pr=p.price?'<span class="pr">¥'+p.price+'</span>':'<span class="pr na">暂无报价</span>';return '<div class="mi"><span>'+esc(m)+'</span>'+pr+'</div>'}).join('');

            return '<div class="card"><div class="card-hd" onclick="toggle('+s.id+')"><div class="card-name">'+badge(fm[s.fid]||'')+'<span>'+esc(s.name)+'</span><span class="cnt">'+s.count+' 产品</span></div><span class="exp" id="e'+s.id+'">▼</span></div><div class="card-bd" id="b'+s.id+'"><div class="pdf-list">'+pdfHtml+'</div><div class="mdl">'+mdl+'</div></div></div>';
        }).join('');

        document.getElementById('s3').textContent=totalPdf;

    }catch(e){
        document.getElementById('results').innerHTML='<div class="hint"><div class="ic">❌</div><p>搜索失败: '+esc(e.message)+'</p></div>';
    }
    btn.disabled=false;
}

function toggle(id){document.getElementById('b'+id).classList.toggle('open');document.getElementById('e'+id).classList.toggle('on')}
document.getElementById('kw').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
</script>
</body>
</html>
