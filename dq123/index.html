<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电气资料检索 - dq123</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        .search-box {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 30px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
        }
        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid #3a7bd5;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            outline: none;
        }
        .search-input::placeholder { color: #666; }
        .search-input:focus { border-color: #00d2ff; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #00d2ff;
        }
        .stat-label { color: #888; }
        .results {
            margin-top: 30px;
        }
        .result-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .result-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: #3a7bd5;
            transform: translateY(-2px);
        }
        .result-title {
            font-size: 1.2em;
            color: #00d2ff;
            margin-bottom: 10px;
        }
        .result-meta {
            display: flex;
            gap: 20px;
            color: #888;
            font-size: 0.9em;
        }
        .result-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-right: 10px;
        }
        .type-sample { background: #3a7bd5; }
        .type-cad { background: #00b894; }
        .type-3d { background: #6c5ce7; }
        .type-cert { background: #fdcb6e; color: #000; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .footer {
            text-align: center;
            padding: 40px 0;
            color: #666;
            font-size: 0.9em;
        }
        .hint {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 电气资料检索</h1>
            <p class="subtitle">基于 dq123.com 电天下 · 样本/CAD/3D/证书一站式检索</p>
        </header>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" 
                   placeholder="输入型号或关键词 · 回车检索 · 例如：NXM、NM1、CM3" autofocus>
        </div>

        <div class="stats" id="stats" style="display:none;">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">相关资源</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="sampleCount">0</div>
                <div class="stat-label">产品样本</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="cadCount">0</div>
                <div class="stat-label">CAD图纸</div>
            </div>
        </div>

        <div class="results" id="results">
            <div class="hint">👆 输入型号开始检索</div>
        </div>

        <div class="footer">
            <p>数据来源：dq123.com 电天下 · 仅供学习交流使用</p>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const statsDiv = document.getElementById('stats');

        // dq123 JSONP 搜索
        function searchDQ123(keyword) {
            return new Promise((resolve, reject) => {
                const ts = Date.now();
                const callbackName = `cb_${ts}`;
                
                // 创建全局回调
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.head.removeChild(script);
                    resolve(data);
                };

                // 创建 script 标签
                const script = document.createElement('script');
                script.src = `https://dian.dq123.com/open/sprice?v=${ts}&fid=&sid=&kw=${encodeURIComponent(keyword)}&pi=1&callback=${callbackName}`;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        // 自定义 Base64 解码
        function decodeData(encoded) {
            const s = encoded.substring(20).replace(/#/g, '+');
            return JSON.parse(atob(s));
        }

        // 搜索处理
        async function handleSearch() {
            const keyword = searchInput.value.trim();
            if (!keyword) return;

            resultsDiv.innerHTML = '<div class="loading">🔍 搜索中...</div>';
            statsDiv.style.display = 'none';

            try {
                const response = await searchDQ123(keyword);
                const decoded = decodeData(response);
                
                if (decoded.data && decoded.data.length > 0) {
                    displayResults(decoded);
                } else {
                    resultsDiv.innerHTML = '<div class="hint">😅 未找到相关资料</div>';
                }
            } catch (error) {
                console.error('搜索失败:', error);
                resultsDiv.innerHTML = '<div class="hint">❌ 搜索失败，请稍后重试</div>';
            }
        }

        // 显示结果
        function displayResults(data) {
            const items = data.data || [];
            const totalCount = data.remark?.totalCount || items.length;

            // 统计
            let sampleCount = 0;
            let cadCount = 0;
            items.forEach(item => {
                if (item.type?.includes('样本') || item.type?.includes('说明书')) sampleCount++;
                if (item.type?.includes('CAD') || item.type?.includes('图块')) cadCount++;
            });

            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('sampleCount').textContent = sampleCount;
            document.getElementById('cadCount').textContent = cadCount;
            statsDiv.style.display = 'flex';

            // 渲染结果卡片
            let html = '';
            items.slice(0, 20).forEach((item, index) => {
                const typeClass = getTypeClass(item.type);
                html += `
                    <div class="result-card" onclick="openDetail('${item.productID}')">
                        <div class="result-title">
                            <span class="result-type ${typeClass}">${item.type || '资料'}</span>
                            ${item.model || item.className || '未知型号'}
                        </div>
                        <div class="result-meta">
                            <span>📋 ${item.className || ''}</span>
                            <span>🏭 厂家ID: ${item.F_ManufactoryID || ''}</span>
                            <span>📦 系列ID: ${item.F_ProductLineID || ''}</span>
                            ${item.price ? `<span>💰 ¥${item.price}</span>` : ''}
                        </div>
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }

        // 获取类型样式
        function getTypeClass(type) {
            if (!type) return 'type-sample';
            if (type.includes('CAD') || type.includes('图块')) return 'type-cad';
            if (type.includes('3D') || type.includes('模型')) return 'type-3d';
            if (type.includes('证书') || type.includes('认证')) return 'type-cert';
            return 'type-sample';
        }

        // 打开详情（跳转 dq123）
        function openDetail(productId) {
            window.open(`https://www.dq123.com/price`, '_blank');
        }

        // 事件监听
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        // 自动聚焦
        searchInput.focus();
    </script>
</body>
</html>
