<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电气资料检索 · dq123</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .splash-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-screen.fade-out { opacity: 0; pointer-events: none; }
        .splash-title {
            font-size: 3em; font-weight: 800;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;
        }
        .splash-subtitle { color: #888; font-size: 1.1em; }
        .splash-author { color: #666; margin-top: 30px; font-size: 0.9em; }
        .container {
            max-width: 1000px; margin: 0 auto; padding: 20px;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .container.fade-in { opacity: 1; }
        header { text-align: center; padding: 30px 0; }
        h1 {
            font-size: 2.2em; font-weight: 800;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tagline { color: #888; margin-top: 8px; font-size: 0.95em; letter-spacing: 1px; }
        .search-box {
            display: flex; gap: 10px; max-width: 600px; margin: 30px auto;
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            flex: 1; background: transparent; border: none; color: #fff;
            font-size: 1.1em; padding: 12px 16px; outline: none;
        }
        .search-box input::placeholder { color: #666; }
        .search-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none; color: #fff; padding: 12px 24px; border-radius: 8px;
            cursor: pointer; font-size: 1em; transition: opacity 0.3s;
        }
        .search-btn:hover { opacity: 0.8; }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats-bar {
            display: flex; justify-content: center; gap: 40px;
            padding: 20px 0; margin-bottom: 20px;
        }
        .stat { text-align: center; }
        .stat-num { font-size: 2em; font-weight: bold; color: #00d2ff; }
        .stat-label { color: #888; font-size: 0.9em; margin-top: 4px; }
        .loading-spinner {
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 0; color: #888;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d2ff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hint-message { text-align: center; padding: 60px 0; color: #888; }
        .hint-icon { font-size: 3em; margin-bottom: 16px; }
        /* 产品表格 */
        .table-wrap { margin: 10px 0; overflow-x: auto; }
        .product-table { width: 100%; border-collapse: collapse; }
        .product-table th {
            text-align: left; padding: 12px 14px; color: #888; font-weight: 600;
            font-size: 0.8em; border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); position: sticky; top: 0;
        }
        .product-table td {
            padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.9em;
        }
        .product-table tr { cursor: pointer; transition: background 0.15s; }
        .product-table tr:hover { background: rgba(0,210,255,0.05); }
        .price { color: #ff6b6b; font-weight: 700; font-size: 1em; }
        .price-na { color: #555; font-size: 0.85em; }
        .series-tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75em; background: rgba(0,210,255,0.15); color: #00d2ff;
        }
        .type-tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75em; background: rgba(168,85,247,0.15); color: #a855f7;
        }
        .model-text { font-weight: 600; color: #fff; }
        /* 分页 */
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 8px; padding: 20px 0;
        }
        .page-btn {
            padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer;
            font-size: 0.85em; transition: all 0.2s;
        }
        .page-btn:hover { background: rgba(0,210,255,0.1); border-color: rgba(0,210,255,0.3); }
        .page-btn.active { background: rgba(0,210,255,0.2); border-color: #00d2ff; color: #00d2ff; font-weight: 600; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { color: #888; font-size: 0.85em; }
        .footer {
            text-align: center; padding: 40px 0 20px; color: #555; font-size: 0.85em;
        }
        .footer a { color: #3a7bd5; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="splash-screen" id="splash">
        <div class="splash-title">电气资料检索</div>
        <div class="splash-subtitle">Electrical Selection Data Retrieval System</div>
        <div class="splash-author">作者：TENGEN-LUSANJIANG</div>
    </div>

    <div class="container" id="mainContainer">
        <header>
            <h1>天正电气 · 可信赖 更美好</h1>
            <p class="tagline">Electrical Selection Data Retrieval System</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入型号或关键词，如 CM5、NXM、TGM1N..." autocomplete="off">
            <button class="search-btn" id="searchBtn" onclick="handleSearch()">检索</button>
        </div>

        <div class="stats-bar" id="statsBar" style="display:none;">
            <div class="stat">
                <div class="stat-num" id="statSeries">0</div>
                <div class="stat-label">产品系列</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statProducts">0</div>
                <div class="stat-label">产品型号</div>
            </div>
        </div>

        <div id="results">
            <div class="hint-message">
                <div class="hint-icon">🔍</div>
                <p>输入型号开始检索电气资料</p>
                <p style="margin-top:10px; font-size:0.9em;">支持正泰·德力西·常熟·施耐德·ABB·西门子·环宇·北元·上海人民·良信·北京人民</p>
            </div>
        </div>

        <div class="footer">
            <p>数据来源：<a href="https://www.dq123.com" target="_blank">dq123.com 电天下</a> · 仅供学习交流使用</p>
        </div>
    </div>

    <script>
        // 开机画面
        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
            document.getElementById('mainContainer').classList.add('fade-in');
            document.getElementById('searchInput').focus();
        }, 1500);

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const statsBar = document.getElementById('statsBar');
        const searchBtn = document.getElementById('searchBtn');

        const PAGE_SIZE = 30;
        let allProducts = [];
        let currentPage = 1;

        // JSONP 调用工具
        function jsonpCall(url) {
            return new Promise((resolve, reject) => {
                const ts = Date.now();
                const cbName = `cb_${ts}`;
                window[cbName] = function(data) {
                    delete window[cbName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = url + (url.includes('?') ? '&' : '?') + `callback=${cbName}`;
                script.onerror = () => { reject(new Error('JSONP failed')); };
                document.head.appendChild(script);
                setTimeout(() => { reject(new Error('Timeout')); }, 15000);
            });
        }

        // 解码 dq123 加密数据
        function decodeDQ123(encoded) {
            const s = encoded.substring(20).replace(/#/g, '+');
            return JSON.parse(atob(s));
        }

        // 去HTML标签
        function stripHtml(s) {
            return (s || '').replace(/<[^>]+>/g, '').replace(/<\/?\w+/g, '').trim();
        }

        // 搜索产品（sprice API）- 多页
        async function searchProducts(keyword, maxPages = 5) {
            let allRecords = [];
            for (let page = 1; page <= maxPages; page++) {
                const ts = Date.now();
                const raw = await jsonpCall(
                    `https://dian.dq123.com/open/sprice?v=${ts}&fid=&sid=&kw=${encodeURIComponent(keyword)}&pi=${page}`
                );
                const data = decodeDQ123(raw);
                const records = data.data || [];
                if (records.length === 0) break;
                allRecords = allRecords.concat(records);
                if (records.length < 20) break; // 最后一页
            }
            return allRecords;
        }

        // 主搜索流程
        async function handleSearch() {
            const keyword = searchInput.value.trim();
            if (!keyword) return;

            searchBtn.disabled = true;
            resultsDiv.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>正在检索: ${keyword}</p>
                    <p style="margin-top:8px; font-size:0.85em; color:#666;">搜索产品型号...</p>
                </div>
            `;
            statsBar.style.display = 'none';

            try {
                // 搜索产品
                const records = await searchProducts(keyword);

                if (records.length === 0) {
                    resultsDiv.innerHTML = `
                        <div class="hint-message">
                            <div class="hint-icon">😅</div>
                            <p>未找到 "${keyword}" 相关资料</p>
                            <p style="margin-top:10px; font-size:0.9em;">试试其他关键词</p>
                        </div>
                    `;
                    searchBtn.disabled = false;
                    return;
                }

                // 解析产品
                const seriesSet = new Set();
                allProducts = records.map(r => {
                    const model = stripHtml(r.model || '');
                    const series = r.className || '';
                    const sid = r.F_ProductLineID || 0;
                    if (series) seriesSet.add(series);
                    return {
                        model: model,
                        price: r.price || null,
                        series: series,
                        type: r.type || '',
                        sid: sid,
                        factoryId: r.F_ManufactoryID || 0
                    };
                }).filter(p => p.model);

                // 去重
                const seen = new Set();
                allProducts = allProducts.filter(p => {
                    const key = p.model + '|' + p.series;
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });

                // 按匹配度排序
                const qNorm = keyword.toUpperCase().replace(/\s/g, '');
                allProducts.sort((a, b) => {
                    const am = a.model.toUpperCase().replace(/\s/g, '');
                    const bm = b.model.toUpperCase().replace(/\s/g, '');
                    const aExact = am === qNorm ? 0 : 1;
                    const bExact = bm === qNorm ? 0 : 1;
                    if (aExact !== bExact) return aExact - bExact;
                    const aStarts = am.startsWith(qNorm) ? 0 : 1;
                    const bStarts = bm.startsWith(qNorm) ? 0 : 1;
                    if (aStarts !== bStarts) return aStarts - bStarts;
                    return am.length - bm.length;
                });

                // 更新统计
                document.getElementById('statSeries').textContent = seriesSet.size;
                document.getElementById('statProducts').textContent = allProducts.length;
                statsBar.style.display = 'flex';

                // 渲染
                currentPage = 1;
                renderPage();

            } catch (error) {
                console.error('搜索失败:', error);
                resultsDiv.innerHTML = `
                    <div class="hint-message">
                        <div class="hint-icon">❌</div>
                        <p>搜索失败，请稍后重试</p>
                        <p style="margin-top:8px; font-size:0.85em; color:#666;">${error.message}</p>
                    </div>
                `;
            }

            searchBtn.disabled = false;
        }

        // 渲染当前页
        function renderPage() {
            const totalPages = Math.ceil(allProducts.length / PAGE_SIZE);
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, allProducts.length);
            const pageProducts = allProducts.slice(start, end);

            let h = '<div class="table-wrap"><table class="product-table">';
            h += '<thead><tr><th>#</th><th>型号</th><th>系列</th><th>类型</th><th>参考价</th></tr></thead><tbody>';

            pageProducts.forEach((p, i) => {
                const priceStr = p.price ? `<span class="price">¥${p.price}</span>` : '<span class="price-na">暂无报价</span>';
                const seriesStr = p.series ? `<span class="series-tag">${esc(p.series)}</span>` : '-';
                const typeStr = p.type ? `<span class="type-tag">${esc(p.type)}</span>` : '-';
                h += `<tr>
                    <td style="color:#555">${start + i + 1}</td>
                    <td class="model-text">${esc(p.model)}</td>
                    <td>${seriesStr}</td>
                    <td>${typeStr}</td>
                    <td>${priceStr}</td>
                </tr>`;
            });

            h += '</tbody></table></div>';

            // 分页
            if (totalPages > 1) {
                h += '<div class="pagination">';
                h += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>◀ 上一页</button>`;
                h += `<span class="page-info">${currentPage} / ${totalPages} 页 · ${allProducts.length} 条</span>`;
                h += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页 ▶</button>`;
                h += '</div>';
            } else {
                h += `<div style="text-align:center;padding:16px;color:#666;font-size:0.85em;">共 ${allProducts.length} 条结果</div>`;
            }

            resultsDiv.innerHTML = h;
        }

        function goPage(page) {
            const totalPages = Math.ceil(allProducts.length / PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // 回车搜索
        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });
    </script>
</body>
</html>
