<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电气选型 · 点选报价</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh}
        .container{max-width:1100px;margin:0 auto;padding:20px}
        header{text-align:center;padding:20px 0}
        h1{font-family:'ZCOOL XiaoWei',serif;font-size:2em;background:linear-gradient(45deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .tagline{color:#888;margin-top:4px;font-size:0.9em}
        .search-box{display:flex;gap:10px;max-width:600px;margin:16px auto;background:rgba(255,255,255,0.05);border-radius:12px;padding:8px;border:1px solid rgba(255,255,255,0.1)}
        .search-box input{flex:1;background:transparent;border:none;color:#fff;font-size:1.1em;padding:10px 14px;outline:none}
        .search-box input::placeholder{color:#666}
        .search-btn{background:linear-gradient(45deg,#00d2ff,#3a7bd5);border:none;color:#fff;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:1em}
        .search-btn:hover{opacity:0.8}
        .search-btn:disabled{opacity:0.5;cursor:not-allowed}
        .series-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
        .series-btn{padding:6px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;color:#aaa;cursor:pointer;font-size:0.85em;transition:all 0.15s}
        .series-btn:hover,.series-btn.active{background:rgba(0,210,255,0.15);border-color:#00d2ff;color:#00d2ff}
        .series-btn .cnt{color:#666;font-size:0.8em;margin-left:4px}
        .stats{display:flex;gap:20px;justify-content:center;padding:8px 0;color:#888;font-size:0.85em}
        .stats b{color:#00d2ff}
        table{width:100%;border-collapse:collapse;margin:10px 0}
        th{text-align:left;padding:10px 12px;color:#888;font-weight:normal;font-size:0.8em;border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:0;background:#16132b;cursor:pointer;user-select:none}
        th:hover{color:#ccc}
        td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.9em}
        tr:hover{background:rgba(255,255,255,0.03)}
        .price{color:#ff6b6b;font-weight:600}
        .price-na{color:#444}
        .model{color:#e0e0e0}
        .series-tag{color:#888;font-size:0.8em}
        .pager{display:flex;justify-content:center;gap:6px;margin:12px 0;align-items:center}
        .pg{padding:5px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:4px;color:#aaa;cursor:pointer;font-size:0.8em}
        .pg:hover,.pg.active{background:rgba(0,210,255,0.15);border-color:#00d2ff;color:#00d2ff}
        .pg-info{color:#666;font-size:0.8em}
        .hint{text-align:center;color:#666;padding:40px;font-size:0.95em}
        .loading{text-align:center;color:#888;padding:30px}
        .error{color:#ff6b6b;text-align:center;padding:20px}
        .footer{text-align:center;padding:30px 0 10px;color:#444;font-size:0.8em}
        .footer a{color:#3a7bd5;text-decoration:none}
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>天正电气 · 可信赖 更美好</h1>
        <p class="tagline">Electrical Selection Data Retrieval System</p>
    </header>
    <div class="search-box">
        <input type="text" id="kw" placeholder="输入型号关键词，如 NXM、CM3、CW1、TGW45..." autocomplete="off">
        <button class="search-btn" id="btn" onclick="doSearch()">检索</button>
    </div>
    <div id="seriesBar" class="series-bar"></div>
    <div id="stats" style="display:none" class="stats"></div>
    <div id="area"><div class="hint">输入关键词开始选型</div></div>
    <div class="footer">数据来源：<a href="https://www.dq123.com" target="_blank">dq123.com</a> · 实时抓取 · 仅供学习交流</div>
</div>

<script>
const API_BASE='https://dian.dq123.com';
let ALL_PRODUCTS=[];
let SERIES_LIST=[];
let PAGE=1;
const PAGESIZE=50;
let SORT={col:null,asc:true};

// JSONP 调用（不受证书/CORS限制）
function jsonp(url){
    return new Promise((resolve,reject)=>{
        const cb='cb_'+Date.now()+Math.random().toString(36).slice(2,6);
        window[cb]=function(data){delete window[cb];s.remove();resolve(data);};
        const s=document.createElement('script');
        s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
        s.onerror=function(){delete window[cb];s.remove();reject(new Error('JSONP加载失败'));};
        document.head.appendChild(s);
        setTimeout(function(){delete window[cb];if(s.parentNode)s.remove();reject(new Error('请求超时'));},15000);
    });
}

// 解码 dq123 数据
function decode(raw){
    const b64=raw.substring(20).replace(/#/g,'+');
    const bin=atob(b64);
    return JSON.parse(decodeURIComponent(escape(bin)));
}

function clean(m){return(m||'').replace(/<[^>]+>/g,'')}

// 搜索
async function doSearch(){
    const kw=document.getElementById('kw').value.trim();
    if(!kw)return;
    document.getElementById('btn').disabled=true;
    document.getElementById('area').innerHTML='<div class="loading">搜索中...</div>';
    document.getElementById('seriesBar').innerHTML='';
    document.getElementById('stats').style.display='none';

    try{
        ALL_PRODUCTS=[];SERIES_LIST=[];

        // 第一页
        const d1=await jsonp(API_BASE+'/open/sprice?v='+Date.now()+'&fid=&sid=&kw='+encodeURIComponent(kw)+'&pi=1');
        const data1=decode(d1);
        SERIES_LIST=(data1.remark&&data1.remark.F_ProductLineID)||[];
        const total=(data1.remark&&data1.remark.totalCount)||0;
        const pages=Math.min(Math.ceil(total/20),25);
        addProds(data1);

        // 剩余页并行
        if(pages>1){
            const fs=[];
            for(let p=2;p<=pages;p++) fs.push(jsonp(API_BASE+'/open/sprice?v='+(Date.now()+p)+'&fid=&sid=&kw='+encodeURIComponent(kw)+'&pi='+p).then(r=>decode(r)));
            (await Promise.all(fs)).forEach(r=>addProds(r));
        }

        // 去重
        const seen=new Set();
        ALL_PRODUCTS=ALL_PRODUCTS.filter(p=>{if(seen.has(p.prop))return false;seen.add(p.prop);return true;});

        // 渲染系列选择
        if(SERIES_LIST.length>1){
            let h='';
            SERIES_LIST.forEach((s,i)=>{
                h+='<div class="series-btn'+(i===0?' active':'')+'" onclick="filterSeries(\''+s.Key+'\',this)">'+s.Name+'<span class="cnt">'+s.Value+'</span></div>';
            });
            document.getElementById('seriesBar').innerHTML=h;
        }

        renderTable();
        document.getElementById('btn').disabled=false;
    }catch(e){
        document.getElementById('area').innerHTML='<div class="error">'+e.message+'</div>';
        document.getElementById('btn').disabled=false;
    }
}

function addProds(d){
    (d.data||[]).forEach(function(p){
        const m=clean(p.model||'');
        if(m&&p.propOptSet) ALL_PRODUCTS.push({model:m,price:p.price,prop:p.propOptSet,series:p.className||'',type:p.type||'',sid:p.F_ProductLineID||''});
    });
}

function filterSeries(sid,el){
    document.querySelectorAll('.series-btn').forEach(b=>b.classList.remove('active'));
    if(el)el.classList.add('active');
    PAGE=1;
    renderTable(sid);
}

function renderTable(filterSid){
    const list=filterSid?ALL_PRODUCTS.filter(p=>String(p.sid)===String(filterSid)):ALL_PRODUCTS;
    const total=list.length;
    const priced=list.filter(p=>p.price&&parseFloat(p.price)>0).length;
    document.getElementById('stats').innerHTML='共 <b>'+total+'</b> 条 · 有价格 <b>'+priced+'</b> 条';
    document.getElementById('stats').style.display='flex';

    if(!total){document.getElementById('area').innerHTML='<div class="hint">未找到产品</div>';return;}

    // 排序
    if(SORT.col){
        list.sort((a,b)=>{
            let va=a[SORT.col]||'',vb=b[SORT.col]||'';
            if(SORT.col==='price'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
            if(va<vb)return SORT.asc?-1:1;
            if(va>vb)return SORT.asc?1:-1;
            return 0;
        });
    }

    // 分页
    const start=(PAGE-1)*PAGESIZE;
    const slice=list.slice(start,start+PAGESIZE);

    let h='<table><thead><tr>';
    h+='<th onclick="sortBy(\'model\')">型号</th>';
    h+='<th onclick="sortBy(\'series\')">系列</th>';
    h+='<th onclick="sortBy(\'type\')">类型</th>';
    h+='<th onclick="sortBy(\'price\')">价格</th>';
    h+='</tr></thead><tbody>';

    slice.forEach(p=>{
        const pr=p.price&&parseFloat(p.price)>0?'<span class="price">¥'+parseFloat(p.price).toLocaleString()+'</span>':'<span class="price-na">—</span>';
        h+='<tr><td class="model">'+p.model+'</td><td class="series-tag">'+p.series+'</td><td class="series-tag">'+p.type+'</td><td>'+pr+'</td></tr>';
    });
    h+='</tbody></table>';

    const tp=Math.ceil(total/PAGESIZE);
    if(tp>1){
        h+='<div class="pager">';
        for(let i=1;i<=Math.min(tp,15);i++) h+='<div class="pg'+(i===PAGE?' active':'')+'" onclick="goPage('+i+')">'+i+'</div>';
        h+='<span class="pg-info">共'+tp+'页</span></div>';
    }
    document.getElementById('area').innerHTML=h;
}

function sortBy(col){
    if(SORT.col===col)SORT.asc=!SORT.asc;
    else{SORT.col=col;SORT.asc=true;}
    renderTable();
}

function goPage(p){PAGE=p;renderTable();}

document.getElementById('kw').addEventListener('keypress',e=>{if(e.key==='Enter')doSearch()});
</script>
</body>
</html>
