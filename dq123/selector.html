<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}

.search-box{display:flex;gap:10px;max-width:600px;margin:16px auto;background:rgba(255,255,255,.05);border-radius:12px;padding:8px;border:1px solid rgba(255,255,255,.1)}
.search-box input{flex:1;background:transparent;border:none;color:#fff;font-size:1.1em;padding:10px 14px;outline:none}
.search-box input::placeholder{color:#666}
.search-btn{background:linear-gradient(45deg,#00d2ff,#3a7bd5);border:none;color:#fff;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:1em}

th:hover{color:#ccc}
td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.9em;cursor:pointer}
tr:hover{background:rgba(255,255,255,.03)}
tr.active{background:rgba(0,210,255,.08)}
.price{color:#ff6b6b;font-weight:600}
.price-na{color:#444}
.model{color:#e0e0e0}
.series-tag{color:#888;font-size:.8em}
.hint{text-align:center;color:#666;padding:40px;font-size:.95em}
.loading{text-align:center;color:#888;padding:30px}

.footer{text-align:center;padding:30px 0 10px;color:#444;font-size:.8em}
.footer a{color:#3a7bd5;text-decoration:none}
/* еҸӮж•°йқўжқҝ */
.param-panel{margin:12px 0;padding:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px}
.param-panel h4{color:#00d2ff;font-size:.95em;margin-bottom:12px}
.param-group{margin-bottom:10px}
.param-group .pg-label{color:#888;font-size:.8em;margin-bottom:4px}
.param-group .pg-opts{display:flex;flex-wrap:wrap;gap:6px}
.param-group .pg-opt{padding:4px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#aaa;cursor:pointer;font-size:.82em;transition:all .15s}
.param-group .pg-opt:hover{border-color:rgba(0,210,255,.4);color:#ccc}
.param-group .pg-opt.selected{background:rgba(0,210,255,.2);border-color:#00d2ff;color:#00d2ff}
.match-info{margin-top:12px;padding:10px;background:rgba(0,210,255,.05);border-radius:8px;font-size:.85em}
.match-info .mi-price{font-size:1.3em;color:#ff6b6b;font-weight:700}
.match-info .mi-model{color:#e0e0e0}
.pager{display:flex;justify-content:center;gap:6px;margin:12px 0;align-items:center}
.pg{padding:5px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:4px;color:#aaa;cursor:pointer;font-size:.8em}
.pg:hover,.pg.active{background:rgba(0,210,255,.15);border-color:#00d2ff;color:#00d2ff}
.pg-info{color:#666;font-size:.8em}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>еӨ©жӯЈз”өж°” В· еҸҜдҝЎиө– жӣҙзҫҺеҘҪ</h1>
    <p class="tagline">Electrical Selection Data Retrieval System</p>
  </header>
  <div class="search-box">
    <input type="text" id="kw" placeholder="иҫ“е…ҘеһӢеҸ·е…ій”®иҜҚпјҢеҰӮ NXMгҖҒCM3гҖҒCW1..." autocomplete="off">
    <button class="search-btn" id="btn" onclick="doSearch()">жЈҖзҙў</button>
  </div>
  <div id="seriesBar" class="series-bar"></div>
  <div id="stats" style="display:none" class="stats"></div>
  <div id="area"><div class="hint">иҫ“е…Ҙе…ій”®иҜҚејҖе§ӢйҖүеһӢ</div></div>
  <div class="footer">ж•°жҚ®жқҘжәҗпјҡ<a href="https://www.dq123.com" target="_blank">dq123.com</a> В· д»…дҫӣеӯҰд№ дәӨжөҒ</div>
</div>

<script>
const API='https://dian.dq123.com';
const PROXY='/dq123'; // nginxд»ЈзҗҶпјҢз»•иҝҮCORS
const DX2='https://dx2.dhub.com.cn';
let ALL=[],SERIES=[],PAGE=1,PS=50,SORT={c:null,a:true};
let CONFIG_CACHE={}; // sid -> {dims:[], options:{as->av}}
let ACTIVE_ROW=-1;
let CURRENT_PROPS={}; // group -> selected as value

// === JSONP ===
function jsonp(url){
  return new Promise((ok,no)=>{
    const cb='cb_'+Date.now()+Math.random().toString(36).slice(2,6);
    window[cb]=d=>{delete window[cb];s.remove();ok(d)};
    const s=document.createElement('script');
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    s.onerror=()=>{delete window[cb];s.remove();no(new Error('JSONPеӨұиҙҘ'))};
    document.head.appendChild(s);
    setTimeout(()=>{delete window[cb];if(s.parentNode)s.remove();no(new Error('и¶…ж—¶'))},15000);
  });
}

// === Base64и§Јз Ғ ===
function decode(raw){
  const b64=raw.substring(20).replace(/#/g,'+');
  const bin=atob(b64);
  return JSON.parse(decodeURIComponent(escape(bin)));
}

function clean(m){return(m||'').replace(/<[^>]+>/g,'').replace(/<\/?\w+/g,'').trim()}

// === CDN ZIP и§ЈеҺӢ ===
// === CDN ZIP и§ЈеҺӢпјҲйҖҡиҝҮnginxд»ЈзҗҶз»•иҝҮCORSпјү===
async function loadZip(path){
  const b64=btoa(path).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const url=PROXY+'/electricData?v='+b64+'&t='+Date.now();
  const resp=await fetch(url);
  if(!resp.ok)return null;
  const buf=await resp.arrayBuffer();
  try{
    const u8=new Uint8Array(buf);
    let pos=0;
    while(pos<u8.length-30){
      if(u8[pos]===0x50&&u8[pos+1]===0x4B&&u8[pos+2]===0x03&&u8[pos+3]===0x04){
        const method=u8[pos+8]|(u8[pos+9]<<8);
        const fnameLen=u8[pos+26]|(u8[pos+27]<<8);
        const extraLen=u8[pos+28]|(u8[pos+29]<<8);
        const compSize=u8[pos+18]|(u8[pos+19]<<8)|(u8[pos+20]<<16)|(u8[pos+21]<<24);
        const dataStart=pos+30+fnameLen+extraLen;
        const compData=u8.subarray(dataStart,dataStart+compSize);
        let raw;
        if(method===0) raw=compData;
        else if(method===8) raw=pako.inflateRaw(compData);
        else return null;
        return JSON.parse(new TextDecoder().decode(raw));
      }
      pos++;
    }
  }catch(e){console.error('ZIPи§ЈеҺӢеӨұиҙҘ:',e);}
  return null;
}

// з”Ёpakoи§ЈеҺӢdeflate
  const url=PROXY+'/electricData?v='+b64+'&t='+Date.now();
  const resp=await fetch(url);
  if(!resp.ok)return null;
  const buf=await resp.arrayBuffer();
  try{
    const u8=new Uint8Array(buf);
    let pos=0;
    while(pos<u8.length-30){
      if(u8[pos]===0x50&&u8[pos+1]===0x4B&&u8[pos+2]===0x03&&u8[pos+3]===0x04){
        const method=u8[pos+8]|(u8[pos+9]<<8);
        const fnameLen=u8[pos+26]|(u8[pos+27]<<8);
        const extraLen=u8[pos+28]|(u8[pos+29]<<8);
        const compSize=u8[pos+18]|(u8[pos+19]<<8)|(u8[pos+20]<<16)|(u8[pos+21]<<24);
        const dataStart=pos+30+fnameLen+extraLen;
        const compData=u8.subarray(dataStart,dataStart+compSize);
        let raw;
        if(method===0) raw=compData;
        else if(method===8) raw=pako.inflateRaw(compData);
        else return null;
        return JSON.parse(new TextDecoder().decode(raw));
      }
      pos++;
    }
  }catch(e){console.error('ZIPи§ЈеҺӢеӨұиҙҘ:',e);}
  return null;

// === жҗңзҙў ===
async function doSearch(){
  const kw=document.getElementById('kw').value.trim();
  if(!kw)return;
  const btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('area').innerHTML='<div class="loading">жҗңзҙўдёӯ...</div>';
  document.getElementById('seriesBar').innerHTML='';
  document.getElementById('stats').style.display='none';
  ACTIVE_ROW=-1; ALL=[]; SERIES=[];

  try{
    const d1=await jsonp(API+'/open/sprice?v='+Date.now()+'&fid=&sid=&kw='+encodeURIComponent(kw)+'&pi=1');
    const data1=decode(d1);
    SERIES=(data1.remark&&data1.remark.F_ProductLineID)||[];
    const total=(data1.remark&&data1.remark.totalCount)||0;
    const pages=Math.min(Math.ceil(total/20),25);
    addProds(data1);

    if(pages>1){
      const fs=[];
      for(let p=2;p<=pages;p++)
        fs.push(jsonp(API+'/open/sprice?v='+(Date.now()+p)+'&fid=&sid=&kw='+encodeURIComponent(kw)+'&pi='+p).then(r=>decode(r)));
      (await Promise.all(fs)).forEach(r=>addProds(r));
    }

    // еҺ»йҮҚ
    const seen=new Set();
    ALL=ALL.filter(p=>{if(seen.has(p.prop))return false;seen.add(p.prop);return true;});

    // зі»еҲ—йҖүжӢ©
    if(SERIES.length>1){
      let h='';
      SERIES.forEach((s,i)=>{
        h+='<div class="series-btn'+(i===0?' active':'')+'" onclick="filterSeries(\''+s.Key+'\',this)">'+clean(s.Name)+'<span class="cnt">'+s.Value+'</span></div>';
      });
      document.getElementById('seriesBar').innerHTML=h;
    }

    renderTable();
  }catch(e){
    document.getElementById('area').innerHTML='<div class="error">'+e.message+'</div>';
  }
  btn.disabled=false;
}

function addProds(d){
  (d.data||[]).forEach(p=>{
    const m=clean(p.model||'');
    if(m&&p.propOptSet)
      ALL.push({model:m,price:p.price,prop:p.propOptSet,series:p.className||'',type:p.type||'',sid:p.F_ProductLineID||''});
  });
}

function filterSeries(sid,el){
  document.querySelectorAll('.series-btn').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  PAGE=1; renderTable(sid);
}

function renderTable(filterSid){
  const list=filterSid?ALL.filter(p=>String(p.sid)===String(filterSid)):ALL;
  const total=list.length;
  const priced=list.filter(p=>p.price&&parseFloat(p.price)>0).length;
  document.getElementById('stats').innerHTML='е…ұ <b>'+total+'</b> жқЎ В· жңүд»·ж ј <b>'+priced+'</b> жқЎ';
  document.getElementById('stats').style.display='flex';

  if(!total){document.getElementById('area').innerHTML='<div class="hint">жңӘжүҫеҲ°дә§е“Ғ</div>';return;}

  if(SORT.c){
    list.sort((a,b)=>{
      let va=a[SORT.c]||'',vb=b[SORT.c]||'';
      if(SORT.c==='price'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
      return va<vb?(SORT.a?-1:1):va>vb?(SORT.a?1:-1):0;
    });
  }

  const start=(PAGE-1)*PS;
  const slice=list.slice(start,start+PS);

  let h='<table><thead><tr>';
  h+='<th onclick="sortBy(\'model\')">еһӢеҸ·</th>';
  h+='<th onclick="sortBy(\'series\')">зі»еҲ—</th>';
  h+='<th onclick="sortBy(\'type\')">зұ»еһӢ</th>';
  h+='<th onclick="sortBy(\'price\')">д»·ж ј</th>';
  h+='</tr></thead><tbody>';

  slice.forEach((p,i)=>{
    const idx=start+i;
    const pr=p.price&&parseFloat(p.price)>0?'<span class="price">ВҘ'+parseFloat(p.price).toLocaleString()+'</span>':'<span class="price-na">вҖ”</span>';
    h+='<tr class="'+(idx===ACTIVE_ROW?'active':'')+'" onclick="selectRow('+idx+')">';
    h+='<td class="model">'+p.model+'</td><td class="series-tag">'+p.series+'</td>';
    h+='<td class="series-tag">'+p.type+'</td><td>'+pr+'</td></tr>';
    // еұ•ејҖеҸӮж•°йқўжқҝ
    if(idx===ACTIVE_ROW) h+='<tr><td colspan="4" id="paramArea">еҠ иҪҪеҸӮж•°дёӯ...</td></tr>';
  });
  h+='</tbody></table>';

  const tp=Math.ceil(total/PS);
  if(tp>1){
    h+='<div class="pager">';
    for(let i=1;i<=Math.min(tp,15);i++) h+='<div class="pg'+(i===PAGE?' active':'')+'" onclick="goPage('+i+')">'+i+'</div>';
    h+='<span class="pg-info">е…ұ'+tp+'йЎө</span></div>';
  }
  document.getElementById('area').innerHTML=h;

  // еҰӮжһңжңүactiveиЎҢпјҢеҠ иҪҪеҸӮж•°
  if(ACTIVE_ROW>=0) loadParams(ACTIVE_ROW);
}

// === йҖүжӢ©дә§е“ҒиЎҢ ===
function selectRow(idx){
  ACTIVE_ROW=idx===ACTIVE_ROW?-1:idx;
  renderTable();
}

// === еҠ иҪҪй…ҚзҪ®зҹ©йҳө + жёІжҹ“еҸӮж•°йқўжқҝ ===
async function loadParams(idx){
  const p=ALL[idx]; if(!p)return;
  const el=document.getElementById('paramArea'); if(!el)return;

  const sid=p.sid;
  // жЈҖжҹҘзј“еӯҳ
  if(!CONFIG_CACHE[sid]){
    el.innerHTML='<div class="loading">еҠ иҪҪй…ҚзҪ®зҹ©йҳө...</div>';
    try{
      const cfg=await loadZip('4/z_p/'+sid+'.jss');
      if(cfg&&cfg.c){
        const dims=[];
        const opts={};
        cfg.c.forEach(item=>{
          if(item.an===1){
            dims.push({key:item.as,label:item.aj||('еҸӮж•°'+item.as),p:item.p,aq:item.aq});
            (item.ar||[]).forEach(o=>{
              opts[o.as]={label:clean(o.at||''),value:o.av||''};
            });
          }
        });
        dims.sort((a,b)=>(a.aq||0)-(b.aq||0));
        CONFIG_CACHE[sid]={dims,opts,raw:cfg};
      } else {
        CONFIG_CACHE[sid]={dims:[],opts:{},raw:null};
      }
    }catch(e){
      CONFIG_CACHE[sid]={dims:[],opts:{},raw:null};
    }
  }

  const cfg=CONFIG_CACHE[sid];
  if(!cfg.dims.length){
    el.innerHTML='<div class="param-panel"><h4>вҡ пёҸ ж— й…ҚзҪ®ж•°жҚ®</h4><p style="color:#888;font-size:.85em">иҜҘзі»еҲ—жҡӮж— й…ҚзҪ®зҹ©йҳө</p></div>';
    return;
  }

  // и§ЈжһҗеҪ“еүҚдә§е“Ғзҡ„propOptSet
  const curOpts=(p.prop||'').split('-').filter(x=>x).map(Number);

  // жёІжҹ“еҸӮж•°йқўжқҝ
  CURRENT_PROPS={};
  let h='<div class="param-panel"><h4>рҹ”§ еҸӮж•°й…ҚзҪ® вҖ” '+p.model+'</h4>';
  cfg.dims.forEach((dim,i)=>{
    const curVal=curOpts[i]||0;
    CURRENT_PROPS[dim.key]=curVal;
    h+='<div class="pg-label">'+dim.label+'</div><div class="pg-group" data-key="'+dim.key+'">';
    // жүҫеұһдәҺиҝҷдёӘз»ҙеәҰзҡ„йҖүйЎ№
    const dimOpts=[];
    if(cfg.raw&&cfg.raw.c){
      const dimItem=cfg.raw.c.find(c=>c.as===dim.key);
      if(dimItem&&dimItem.ar){
        dimItem.ar.forEach(o=>{
          dimOpts.push({as:o.as,label:clean(o.at||''),value:o.av||''});
        });
      }
    }
    if(dimOpts.length){
      dimOpts.forEach(o=>{
        h+='<span class="pg-opt'+(o.as===curVal?' selected':'')+'" onclick="toggleParam('+dim.key+','+o.as+')">'+(o.label||o.value||o.as)+'</span>';
      });
    }
    h+='</div>';
  });
  h+='<div class="match-info" id="matchInfo">зӮ№еҮ»еҸӮж•°еҲҮжҚў вҶ’ е®һж—¶еҢ№й…Қд»·ж ј</div>';
  h+='</div>';
  el.innerHTML=h;

  // еҲқе§ӢеҢ№й…Қ
  matchProduct(idx);
}

// === еҲҮжҚўеҸӮж•° ===
function toggleParam(dimKey,optAs){
  CURRENT_PROPS[dimKey]=optAs;
  // жӣҙж–°UI
  document.querySelectorAll('.pg-group[data-key="'+dimKey+'"] .pg-opt').forEach(el=>{
    el.classList.remove('selected');
  });
  event.target.classList.add('selected');
  // йҮҚж–°еҢ№й…Қ
  matchProduct(ACTIVE_ROW);
}

// === еҢ№й…Қдә§е“Ғ+д»·ж ј ===
function matchProduct(idx){
  const p=ALL[idx]; if(!p)return;
  const cfg=CONFIG_CACHE[p.sid]; if(!cfg)return;

  // жһ„йҖ ж–°зҡ„propOptSet
  const newOpts=cfg.dims.map(d=>CURRENT_PROPS[d.key]||0);
  const newProp=newOpts.join('-');

  // еңЁALLдёӯеҢ№й…Қ
  const match=ALL.find(x=>x.prop===newProp&&String(x.sid)===String(p.sid));
  const info=document.getElementById('matchInfo');
  if(!info)return;

  if(match){
    const pr=match.price&&parseFloat(match.price)>0?'ВҘ'+parseFloat(match.price).toLocaleString():'жҡӮж— жҠҘд»·';
    info.innerHTML='<div class="mi-model">еҢ№й…ҚеһӢеҸ·пјҡ'+match.model+'</div><div class="mi-price">'+pr+'</div>';
  } else {
    info.innerHTML='<div style="color:#ff6b6b">жңӘеҢ№й…ҚеҲ°дә§е“Ғ В· propOptSet: '+newProp+'</div>';
    // е°қиҜ•dx2е®ҡд»·API
    tryDx2Price(p.sid,newOpts);
  }
}

// === dx2е®ҡд»·API ===
async function tryDx2Price(sid,opts){
  const info=document.getElementById('matchInfo');
  try{
    const payload=JSON.stringify({s:String(sid),options:[opts.join('-')],time:Date.now(),from:'dx2jsapi'});
    const b64=btoa(unescape(encodeURIComponent(payload)));
    const url=DX2+'/api/price?info='+encodeURIComponent(b64);
    const resp=await fetch(url);
    if(resp.ok){
      const data=await resp.json();
      if(data&&data.price){
        info.innerHTML+='<div class="mi-price" style="margin-top:8px">dx2 е®һж—¶д»·пјҡВҘ'+parseFloat(data.price).toLocaleString()+'</div>';
      }
    }
  }catch(e){
    // dx2д№ҹйңҖиҰҒд»ЈзҗҶжҲ–JSONPпјҢйқҷй»ҳеӨұиҙҘ
    console.log('dx2е®ҡд»·еӨұиҙҘ:',e);
  }
}

function sortBy(c){if(SORT.c===c)SORT.a=!SORT.a;else{SORT.c=c;SORT.a=true;}renderTable();}
function goPage(p){PAGE=p;renderTable();}
document.getElementById('kw').addEventListener('keypress',e=>{if(e.key==='Enter')doSearch()});
</script>
<!-- pako for ZIPи§ЈеҺӢ -->
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
