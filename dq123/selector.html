<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电气选型 · 精确报价</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:20px 0}
h1{font-size:1.8em;background:linear-gradient(45deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{color:#888;margin-top:4px;font-size:0.85em}
.search-box{display:flex;gap:10px;max-width:600px;margin:16px auto;background:rgba(255,255,255,0.05);border-radius:12px;padding:8px;border:1px solid rgba(255,255,255,0.1)}
.search-box input{flex:1;background:transparent;border:none;color:#fff;font-size:1.1em;padding:10px 14px;outline:none}
.search-box input::placeholder{color:#666}
.search-btn{background:linear-gradient(45deg,#00d2ff,#3a7bd5);border:none;color:#fff;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:1em}
.search-btn:hover{opacity:0.8}
.search-btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{text-align:center;color:#888;padding:30px}
.err{color:#ff6b6b;text-align:center;padding:20px}
.table-wrap{margin:10px 0;overflow-x:auto}
.product-table{width:100%;border-collapse:collapse}
.product-table th{text-align:left;padding:10px 12px;color:#888;font-weight:normal;font-size:0.8em;border-bottom:1px solid rgba(255,255,255,0.1);background:#16132b}
.product-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.9em}
.product-table tr{cursor:pointer;transition:background 0.15s}
.product-table tr:hover{background:rgba(0,210,255,0.05)}
.product-table tr.active{background:rgba(0,210,255,0.08);border-left:3px solid #00d2ff}
.price{color:#ff6b6b;font-weight:600}
.price-na{color:#444}
.detail{background:rgba(0,210,255,0.03);border:1px solid rgba(0,210,255,0.15);border-radius:10px;padding:20px;margin:10px 0;display:none}
.detail.show{display:block}
.detail h3{color:#00d2ff;margin-bottom:8px}
.detail .price-big{font-size:1.8em;color:#ff6b6b;font-weight:700;margin:8px 0}
.detail .price-big-na{color:#555;font-size:1.2em}
.detail .series-info{color:#888;font-size:0.85em;margin-bottom:16px}
.param-section{margin:10px 0}
.param-label{color:#888;font-size:0.85em;margin-bottom:4px}
.param-label .current{color:#00d2ff;font-weight:600;margin-left:6px}
.param-opts{display:flex;flex-wrap:wrap;gap:4px}
.param-opt{padding:4px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#aaa;cursor:pointer;font-size:0.8em;transition:all 0.15s}
.param-opt:hover{background:rgba(0,210,255,0.1);border-color:rgba(0,210,255,0.3);color:#fff}
.param-opt.selected{background:rgba(0,210,255,0.2);border-color:#00d2ff;color:#00d2ff;font-weight:600}
.pdf-section{margin:16px 0}
.pdf-item{display:block;color:#3a7bd5;text-decoration:none;padding:4px 0;font-size:0.85em}
.pdf-item:hover{text-decoration:underline}
.log{margin:10px 0;padding:8px;background:rgba(0,0,0,0.3);border-radius:6px;font-family:monospace;font-size:0.7em;color:#0f0;max-height:100px;overflow-y:auto;display:none}
.footer{text-align:center;padding:30px 0 10px;color:#444;font-size:0.8em}
.footer a{color:#3a7bd5;text-decoration:none}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>电气选型 · 精确报价</h1>
        <p class="tagline">输入型号检索，点击参数切换型号</p>
    </header>
    <div class="search-box">
        <input type="text" id="kw" placeholder="输入型号，如 NXM-630、TGM1N-400、CM3-100..." autocomplete="off">
        <button class="search-btn" id="btn" onclick="doSearch()">检索</button>
    </div>
    <div id="log" class="log"></div>
    <div id="detail" class="detail"></div>
    <div id="area"><div class="msg">输入型号开始检索</div></div>
    <div class="footer">数据来源：<a href="https://www.dq123.com" target="_blank">dq123.com</a> · 仅供学习交流</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
var API='https://dian.dq123.com';
var PROXY='/dq123';
var products=[];
var zipCache={};
var currentZipData=null;
var currentSelectedAs=[];

// ===== JSONP =====
function jsonp(url){
    return new Promise(function(ok,fail){
        var cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
        var done=false;
        var t=setTimeout(function(){if(!done){done=true;cleanup();fail(new Error('超时'));}},15000);
        function cleanup(){try{delete window[cb];}catch(e){} if(s&&s.parentNode)s.remove();}
        window[cb]=function(d){if(!done){done=true;clearTimeout(t);cleanup();ok(d);}};
        var s=document.createElement('script');
        s.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+cb;
        s.onerror=function(){if(!done){done=true;clearTimeout(t);cleanup();fail(new Error('加载失败'));}};
        document.head.appendChild(s);
    });
}

function decode(enc){
    if(typeof enc!=='string'||enc.length<20)throw new Error('数据异常');
    var b64=enc.substring(20).replace(/#/g,'+');
    var bin=atob(b64);
    var bytes=Uint8Array.from(bin,function(c){return c.charCodeAt(0);});
    return JSON.parse(new TextDecoder().decode(bytes));
}

function strip(m){return(m||'').replace(/<[^>]+>/g,'');}

function log(m){
    var el=document.getElementById('log');
    el.style.display='block';
    el.innerHTML+='['+new Date().toLocaleTimeString()+'] '+m+'<br>';
    el.scrollTop=el.scrollHeight;
}

// ===== 搜索 =====
function doSearch(){
    var raw=document.getElementById('kw').value.trim();
    if(!raw)return;
    document.getElementById('btn').disabled=true;
    document.getElementById('area').innerHTML='<div class="msg">检索中...</div>';
    document.getElementById('detail').className='detail';
    document.getElementById('log').innerHTML='';

    // 用原始关键词搜索
    searchAndDisplay(raw);
}

function searchAndDisplay(kw){
    log('搜索: '+kw);
    jsonp(API+'/open/sprice?v='+Date.now()+'&fid=&sid=&kw='+encodeURIComponent(kw)+'&pi=1')
    .then(function(d1){
        var data=decode(d1);
        var all=data.data||[];
        var total=(data.remark&&data.remark.totalCount)||0;
        log('找到: '+total+'条');

        var seen={};
        var list=[];
        all.forEach(function(p){
            var m=strip(p.model||'');
            if(!m)return;
            var key=m+'|'+(p.className||'');
            if(seen[key])return;
            seen[key]=true;
            list.push({model:m,price:p.price,series:p.className||'',type:p.type||'',sid:p.F_ProductLineID||'',propOptSet:p.propOptSet||''});
        });

        products=list;
        renderTable(list);
        document.getElementById('btn').disabled=false;

        // 如果只有1个产品，自动展开详情
        if(list.length===1)showDetail(0);
    })
    .catch(function(e){
        log('错误: '+e.message);
        document.getElementById('area').innerHTML='<div class="err">'+e.message+'</div>';
        document.getElementById('btn').disabled=false;
    });
}

function renderTable(list){
    if(!list.length){
        document.getElementById('area').innerHTML='<div class="msg">未找到匹配产品</div>';
        return;
    }
    var h='<div class="table-wrap"><table class="product-table"><thead><tr><th>型号</th><th>系列</th><th>价格</th></tr></thead><tbody>';
    list.forEach(function(p,i){
        var pr=p.price&&parseFloat(p.price)>0?'<span class="price">¥'+parseFloat(p.price).toLocaleString()+'</span>':'<span class="price-na">—</span>';
        h+='<tr onclick="showDetail('+i+')"><td>'+p.model+'</td><td style="color:#888;font-size:0.85em">'+p.series+'</td><td>'+pr+'</td></tr>';
    });
    h+='</tbody></table></div>';
    document.getElementById('area').innerHTML=h;
}

// ===== 显示详情 =====
function showDetail(idx){
    var p=products[idx];
    if(!p)return;

    document.querySelectorAll('.product-table tr').forEach(function(r){r.classList.remove('active');});
    var rows=document.querySelectorAll('.product-table tbody tr');
    if(rows[idx])rows[idx].classList.add('active');

    var panel=document.getElementById('detail');
    panel.className='detail show';

    var pr=p.price&&parseFloat(p.price)>0?'<div class="price-big">¥'+parseFloat(p.price).toLocaleString()+'</div>':'<div class="price-big-na">暂无报价</div>';
    var h='<h3 id="detailModel">'+p.model+'</h3>';
    h+='<div id="detailPrice">'+pr+'</div>';
    h+='<div class="series-info">'+p.series+'</div>';
    h+='<div id="params" style="color:#888;font-size:0.85em">加载参数...</div>';
    panel.innerHTML=h;

    if(p.sid){
        if(zipCache[p.sid]){
            currentZipData=zipCache[p.sid];
            currentSelectedAs=p.propOptSet.split('-').map(Number);
            renderParams(p,currentZipData);
        }else{
            loadZip(p);
        }
    }
}

function loadZip(p){
    var path='4/z_p/'+p.sid+'.jss';
    var b64=btoa(path).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/g,'');

    fetch(PROXY+'/electricData?v='+b64+'&t='+Date.now())
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.arrayBuffer();})
    .then(function(buf){
        if(buf.byteLength<10)throw new Error('空文件');
        return JSZip.loadAsync(buf);
    })
    .then(function(zip){
        var js=Object.keys(zip.files).find(function(n){return n.endsWith('.js');});
        if(!js)throw new Error('无JS文件');
        return zip.files[js].async('string');
    })
    .then(function(content){
        var data=JSON.parse(content);
        zipCache[p.sid]=data;
        currentZipData=data;
        currentSelectedAs=p.propOptSet.split('-').map(Number);
        renderParams(p,data);
    })
    .catch(function(e){
        log('ZIP错误: '+e.message);
        document.getElementById('params').innerHTML='<div style="color:#888">参数加载失败</div>';
    });
}

// ===== 渲染参数 =====
function renderParams(product,zipData){
    var asMap={};
    (zipData.c||[]).forEach(function(dim){
        (dim.ar||[]).forEach(function(opt){
            asMap[opt.as]={dim:dim.aj||'',name:opt.au,av:opt.av||''};
        });
    });

    var KEY_DIMS=[
        '壳架等级额定电流','壳架代号','配用壳架',
        '额定极限短路分断能力','额定极限短路分断能力(AC415V)','额定极限短路分断能力(AC400/415V)',
        '额定持续电流Iu','额定电流',
        '脱扣器型号','脱扣器方式','保护类型','保护用途',
        '极数','本体极数命名属性','安装型式','接线形式','接线方式','电压',
        '附件代号','附件代号1','附件代号2','附件标准配置','附件名称',
        '分励脱扣器电压','分励电压','欠压电压','分励欠压电压','电操电压',
        '剩余动作类型','额定剩余动作电流值','分断时间',
        '操作方式','N极型式','过载报警不扣功能',
        '框架代号','扩展功能代号','通讯功能模块代号','控制电压代号','安装位置','颜色',
        '适用产品极数','适用产品分断能力','配用极数'
    ];

    // 按维度名去重合并
    var dimMap={};
    (zipData.c||[]).forEach(function(dim){
        var label=dim.aj||'';
        if(KEY_DIMS.indexOf(label)<0)return;
        var opts=(dim.ar||[]).filter(function(o){return o.au&&o.au!=='null';});
        if(opts.length<=1)return;
        if(!dimMap[label])dimMap[label]=[];
        opts.forEach(function(o){
            if(!dimMap[label].find(function(x){return x.au===o.au;})){
                dimMap[label].push(o);
            }
        });
    });

    // 渲染
    var h='<div style="color:#00d2ff;font-size:0.9em;margin-bottom:12px">📋 产品参数</div>';
    Object.keys(dimMap).forEach(function(label){
        var opts=dimMap[label];
        var currentVal='';
        opts.forEach(function(o){
            if(currentSelectedAs.indexOf(o.as)>=0)currentVal=o.au;
        });

        h+='<div class="param-section">';
        h+='<div class="param-label">▼'+label+(currentVal?' <span class="current">'+currentVal+'</span>':'')+'</div>';
        h+='<div class="param-opts">';
        opts.forEach(function(o){
            var isSel=currentSelectedAs.indexOf(o.as)>=0;
            h+='<div class="param-opt'+(isSel?' selected':'')+'" onclick="pickOpt('+o.as+',\''+label+'\')">'+o.au+'</div>';
        });
        h+='</div></div>';
    });

    // PDF 样本
    var samples=zipData.g||[];
    if(samples.length>0){
        h+='<div class="pdf-section"><div style="color:#00d2ff;font-size:0.9em;margin-bottom:6px">📄 样本文档 ('+samples.length+'个)</div>';
        samples.forEach(function(s){
            var url='http://datafiles.oss-cn-shanghai.aliyuncs.com/dx2_data/proddata/sp/'+s.bk+'/'+s.bl;
            h+='<a class="pdf-item" href="'+url+'" target="_blank">📄 '+s.bl+' ('+s.bm.toFixed(1)+'MB)</a>';
        });
        h+='</div>';
    }

    document.getElementById('params').innerHTML=h;
}

// ===== 点击参数 =====
function pickOpt(asId,dimLabel){
    // 在已有产品列表中找包含这个 asId 的产品
    var bestIdx=-1;
    var bestScore=0;

    products.forEach(function(p,idx){
        var pAs=p.propOptSet.split('-').map(Number);
        // 包含点击的选项 asId 就加分
        if(pAs.indexOf(asId)>=0){
            var score=100; // 基础分：包含目标选项
            // 额外分：当前选中的选项也匹配
            currentSelectedAs.forEach(function(as){
                if(pAs.indexOf(as)>=0)score++;
            });
            if(score>bestScore){bestScore=score;bestIdx=idx;}
        }
    });

    if(bestIdx>=0){
        currentSelectedAs=products[bestIdx].propOptSet.split('-').map(Number);
        showDetail(bestIdx);
        log('切换到: '+products[bestIdx].model);
    }else{
        log('当前列表中无匹配产品');
    }
}


document.getElementById('kw').addEventListener('keypress',function(e){if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
