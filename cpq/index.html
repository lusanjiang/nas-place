<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITANMATRIX // 电气选型资料检索系统</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--cyan:#00f0ff;--purple:#a855f7;--magenta:#ff00aa;--bg:#050510;--card:rgba(10,10,30,0.7);--glow:0 0 20px rgba(0,240,255,.15)}
body{font-family:'JetBrains Mono','SF Mono','Cascadia Code',monospace;background:var(--bg);color:#c0c8e0;min-height:100vh;overflow-x:hidden}

/* === 网格背景 === */
.grid-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
  background-image:
    linear-gradient(rgba(0,240,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,240,255,.03) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridMove 20s linear infinite}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:60px 60px}}

/* === 扫描线 === */
.scanline{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}

/* === 粒子 === */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.p{position:absolute;width:2px;height:2px;background:var(--cyan);border-radius:50%;opacity:0;animation:float 8s infinite}
@keyframes float{0%{opacity:0;transform:translateY(100vh)}10%{opacity:.6}90%{opacity:.6}100%{opacity:0;transform:translateY(-20px)}}

/* === 主容器 === */
.wrap{position:relative;z-index:2;max-width:1000px;margin:0 auto;padding:16px 20px}

/* === 启动画面 === */
.boot{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
.boot.done{opacity:0;visibility:hidden}
.boot .logo{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;
  background:linear-gradient(135deg,var(--cyan),var(--purple),var(--magenta));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(0,240,255,.3)}
.boot .sub{color:var(--cyan);font-size:11px;letter-spacing:4px;margin-top:12px;opacity:.6}
.boot .bar{width:300px;height:2px;background:rgba(0,240,255,.1);margin-top:30px;border-radius:1px;overflow:hidden}
.boot .bar-inner{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--magenta));border-radius:1px;transition:width .3s}
.boot .log{margin-top:16px;font-size:10px;color:var(--cyan);opacity:.5;height:20px}

/* === 标题 === */
.header{text-align:center;padding:32px 0 16px}
.header h1{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700;letter-spacing:3px;
  background:linear-gradient(135deg,var(--cyan),#60a5fa,var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .tagline{font-size:11px;color:rgba(0,240,255,.4);letter-spacing:3px;margin-top:6px;text-transform:uppercase}
.header .stats-row{display:flex;gap:16px;justify-content:center;margin-top:12px}
.header .chip{padding:4px 14px;border:1px solid rgba(0,240,255,.15);border-radius:20px;font-size:10px;color:rgba(0,240,255,.5);letter-spacing:1px}
.header .chip b{color:var(--cyan)}

/* === 搜索框 === */
.search-wrap{position:relative;max-width:700px;margin:0 auto 20px}
.search-wrap::before{content:'';position:absolute;inset:-2px;border-radius:18px;
  background:linear-gradient(135deg,var(--cyan),var(--purple),var(--magenta));opacity:.3;z-index:-1;
  filter:blur(4px);transition:opacity .3s}
.search-wrap:focus-within::before{opacity:.6}
.search-wrap input{width:100%;padding:16px 20px 16px 52px;background:rgba(8,8,24,.9);
  border:1.5px solid rgba(0,240,255,.2);border-radius:16px;color:var(--cyan);font-family:inherit;
  font-size:15px;outline:none;letter-spacing:1px;transition:.3s}
.search-wrap input:focus{border-color:rgba(0,240,255,.5);box-shadow:0 0 30px rgba(0,240,255,.1)}
.search-wrap input::placeholder{color:rgba(0,240,255,.2);font-size:12px}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.4}

/* === 表头 === */
.th{display:grid;grid-template-columns:40px 120px 1fr 180px;padding:6px 16px;margin-bottom:2px}
.th span{font-size:9px;color:rgba(0,240,255,.3);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.th span:last-child{text-align:right}

/* === 行 === */
.results{display:flex;flex-direction:column;gap:1px}
.row{display:grid;grid-template-columns:40px 120px 1fr 180px;
  background:rgba(10,15,30,.6);border:1px solid transparent;border-radius:8px;
  padding:10px 16px;cursor:pointer;transition:.15s;align-items:center;user-select:none;
  backdrop-filter:blur(4px)}
.row:hover{background:rgba(0,240,255,.04);border-color:rgba(0,240,255,.12);transform:translateX(3px)}
.row.active{background:rgba(168,85,247,.06);border-color:rgba(168,85,247,.25)}
.row .idx{font-size:10px;color:rgba(0,240,255,.2);text-align:center;font-family:'Orbitron',sans-serif}
.row .code{font-size:13px;font-weight:600;color:var(--cyan);text-shadow:0 0 8px rgba(0,240,255,.2)}
.row .name{font-size:12px;color:#8892b0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px}
.row .factory{font-size:11px;color:rgba(0,240,255,.3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}

/* === 详情面板 === */
.detail{display:none;margin-top:16px;border:1px solid rgba(0,240,255,.15);border-radius:16px;
  overflow:hidden;backdrop-filter:blur(12px);background:rgba(8,8,24,.8);
  animation:slideUp .25s ease;box-shadow:0 0 40px rgba(0,240,255,.05)}
.detail.show{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.d-head{padding:20px 24px;border-bottom:1px solid rgba(0,240,255,.1);display:flex;justify-content:space-between;align-items:center}
.d-head h3{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--cyan);letter-spacing:1px}
.d-head .sub{font-size:11px;color:rgba(0,240,255,.3);margin-top:4px}
.d-close{background:none;border:1px solid rgba(255,0,170,.3);border-radius:8px;color:var(--magenta);
  padding:4px 14px;cursor:pointer;font-size:11px;font-family:inherit;letter-spacing:1px;transition:.2s}
.d-close:hover{background:rgba(255,0,170,.1);box-shadow:0 0 15px rgba(255,0,170,.15)}

.d-body{padding:20px 24px}
.d-body h4{font-size:11px;color:rgba(0,240,255,.4);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase}

.s-item{display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:rgba(0,240,255,.02);border:1px solid rgba(0,240,255,.08);border-radius:12px;
  margin-bottom:8px;transition:.15s;cursor:pointer;text-decoration:none;color:inherit}
.s-item:hover{border-color:rgba(0,240,255,.25);background:rgba(0,240,255,.04);transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(0,240,255,.05)}
.s-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:white;flex-shrink:0;
  background:linear-gradient(135deg,#ff4444,#cc0000);box-shadow:0 4px 15px rgba(255,68,68,.2)}
.s-info{flex:1;min-width:0}
.s-info .sn{font-size:13px;font-weight:500;color:#c0c8e0}
.s-info .su{font-size:10px;color:rgba(0,240,255,.25);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:3px}
.s-dl{font-size:11px;color:var(--cyan);font-weight:600;white-space:nowrap;text-shadow:0 0 8px rgba(0,240,255,.2)}

.no-data{color:rgba(0,240,255,.25);font-size:12px;padding:8px 0;font-style:italic}
.loading-d{text-align:center;padding:24px;color:rgba(0,240,255,.3);font-size:12px}
.loading-d::before{content:'▸ ';color:var(--cyan)}
@keyframes blink{50%{opacity:0}}
.cursor{animation:blink 1s infinite}

.empty-state{text-align:center;padding:60px 20px;color:rgba(0,240,255,.15)}
.empty-state .icon{font-size:48px;margin-bottom:12px}

/* === 底部 === */
.footer{text-align:center;padding:30px 0 20px;font-size:9px;color:rgba(0,240,255,.15);letter-spacing:2px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,240,255,.15);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,240,255,.25)}

@media(max-width:640px){
  .th,.row{grid-template-columns:32px 90px 1fr 100px}
  .header h1{font-size:16px;letter-spacing:1px}
  .search-wrap input{font-size:13px;padding:14px 16px 14px 44px}
  .header .stats-row{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- 启动画面 -->
<div class="boot" id="boot">
  <div class="logo">TITANMATRIX</div>
  <div class="sub">ELECTRICAL SELECTION SYSTEM v3.0</div>
  <div class="bar"><div class="bar-inner" id="bootBar"></div></div>
  <div class="log" id="bootLog"></div>
</div>

<!-- 背景效果 -->
<div class="grid-bg"></div>
<div class="scanline"></div>
<div class="particles" id="particles"></div>

<!-- 主内容 -->
<div class="wrap">
  <div class="header">
    <h1>⚡ TITANMATRIX</h1>
    <div class="tagline">Electrical Selection Data Retrieval System</div>
    <div class="stats-row" id="stats">
      <div class="chip">INITIALIZING<span class="cursor">_</span></div>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="kw" placeholder="输入型号 · 回车检索 · 双击查看资料" autofocus>
  </div>

  <div id="th" class="th" style="display:none">
    <span>#</span><span>SERIES CODE</span><span>SERIES NAME</span><span style="text-align:right">FACTORY</span>
  </div>
  <div class="results" id="list"></div>
  <div class="detail" id="detail"></div>
  <div class="footer">TITANMATRIX ELECTRICAL CPQ SYSTEM · POWERED BY CDN DATA STREAM</div>
</div>

<script>
// === MD5 签名算法 ===

86);V=f(V,Y,X,W,C[P+6],z,3225465664);W=f(W,V,Y,X,C[P+11],y,643717713);X=f(X,W,V,Y,C[P],w,3921069994);Y=f(Y,X,W,V,C[P+5],A,3593408605);V=f(V,Y,X,W,C[P+10],z,38016083);W=f(W,V,Y,X,C[P+15],y,3634488961);X=f(X,W,V,Y,C[P+4],w,3889429448);Y=f(Y,X,W,V,C[P+9],A,568446438);V=f(V,Y,X,W,C[P+14],z,3275163606);W=f(W,V,Y,X,C[P+3],y,4107603335);X=f(X,W,V,Y,C[P+8],w,1163531501);Y=f(Y,X,W,V,C[P+13],A,2850285829);V=f(V,Y,X,W,C[P+2],z,4243563512);W=f(W,V,Y,X,C[P+7],y,1735328473);X=f(X,W,V,Y,C[P+12],w,2368359562);Y=D(Y,X,W,V,C[P+5],o,4294588738);V=D(V,Y,X,W,C[P+8],m,2272392833);W=D(W,V,Y,X,C[P+11],l,1839030562);X=D(X,W,V,Y,C[P+14],j,4259657740);Y=D(Y,X,W,V,C[P+1],o,2763975236);V=D(V,Y,X,W,C[P+4],m,1272893353);W=D(W,V,Y,X,C[P+7],l,4139469664);X=D(X,W,V,Y,C[P+10],j,3200236656);Y=D(Y,X,W,V,C[P+13],o,681279174);V=D(V,Y,X,W,C[P],m,3936430074);W=D(W,V,Y,X,C[P+3],l,3572445317);X=D(X,W,V,Y,C[P+6],j,76029189);Y=D(Y,X,W,V,C[P+9],o,3654602809);V=D(V,Y,X,W,C[P+12],m,3873151461);W=D(W,V,Y,X,C[P+15],l,530742520);X=D(X,W,V,Y,C[P+2],j,3299628645);Y=t(Y,X,W,V,C[P],U,4096336452);V=t(V,Y,X,W,C[P+7],T,1126891415);W=t(W,V,Y,X,C[P+14],R,2878612391);X=t(X,W,V,Y,C[P+5],O,4237533241);Y=t(Y,X,W,V,C[P+12],U,1700485571);V=t(V,Y,X,W,C[P+3],T,2399980690);W=t(W,V,Y,X,C[P+10],R,4293915773);X=t(X,W,V,Y,C[P+1],O,2240044497);Y=t(Y,X,W,V,C[P+8],U,1873313359);V=t(V,Y,X,W,C[P+15],T,4264355552);W=t(W,V,Y,X,C[P+6],R,2734768916);X=t(X,W,V,Y,C[P+13],O,1309151649);Y=t(Y,X,W,V,C[P+4],U,4149444226);V=t(V,Y,X,W,C[P+11],T,3174756917);W=t(W,V,Y,X,C[P+2],R,718787259);X=t(X,W,V,Y,C[P+9],O,3951481745);Y=K(Y,h);X=K(X,E);W=K(W,v);V=K(V,g)}return(B(Y)+B(X)+B(W)+B(V)).toLowerCase()}

// === API 签名构造 ===
const APPID='101030',APPKEY='21AF2469E8B442C9B7D658B8EED513DB',WXID='wxda908a998f8d5699';
const CLIENT={system:'miniprogram/microsoft microsoft Windows 11 x64/4.1.9.30 windows zh_CN/SDKVersion 3.15.2',version:'1.0.0'};

function makeSign(param){
  const rank=Array.from({length:16},()=>Math.floor(Math.random()*10)).join('');
  const d=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const ts=`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  const cj=JSON.stringify(CLIENT);
  const pj=JSON.stringify(param);
  const signStr=`appid=${APPID}&client=${cj}&param=${pj}&rank=${rank}&timestamp=${ts}&token=&key=${APPKEY}`;
  return{appid:APPID,client:CLIENT,param,timestamp:ts,rank,sign:md5(signStr)}
}

async function apiPost(url,param){
  const body=makeSign(param);
  const resp=await fetch(url,{method:'POST',
    headers:{'Content-Type':'application/json','apiVersion':'1.0','PlatForm':'Applets',
      'appKey':'00b03396dbbd4c59851d1449adbc009d',
      'Referer':`https://servicewechat.com/${WXID}/10/page-frame.html`},
    body:JSON.stringify(body)});
  return resp.json()
}

// === 粒子效果 ===
const pc=document.getElementById('particles');
for(let i=0;i<20;i++){const p=document.createElement('div');p.className='p';
  p.style.cssText=`left:${Math.random()*100}%;animation-delay:${Math.random()*8}s;animation-duration:${6+Math.random()*6}s;
  width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;${Math.random()>.5?'background:var(--purple)':''}`;
  pc.appendChild(p)}

// === 启动序列 ===
const bootLog=document.getElementById('bootLog'),bootBar=document.getElementById('bootBar');
const bootMsgs=['CONNECTING TO CDN SATELLITE...','LOADING FACTORY DATABASE...','LOADING SERIES INDEX...','CALIBRATING SEARCH ENGINE...','SYSTEM READY'];
let bootIdx=0;
function bootStep(){
  if(bootIdx>=bootMsgs.length){
    bootLog.textContent='✓ ALL SYSTEMS ONLINE';bootBar.style.width='100%';
    setTimeout(()=>{document.getElementById('boot').classList.add('done');loadData()},400);return}
  bootLog.textContent=bootMsgs[bootIdx];bootBar.style.width=((bootIdx+1)/bootMsgs.length*100)+'%';
  bootIdx++;setTimeout(bootStep,300+Math.random()*400)}
setTimeout(bootStep,500);

// === 数据加载 ===
const CDN='https://cdn.titanmatrix.com';
let factories={},series=[],loaded=false;

async function loadData(){
  try{
    const[fr,sr]=await Promise.all([fetch(CDN+'/product/f.js'),fetch(CDN+'/product/s.js')]);
    const ft=await fr.text(),st=await sr.text();
    const fl=JSON.parse(ft.slice(ft.indexOf('[')));
    series=JSON.parse(st.slice(st.indexOf('[')));
    fl.forEach(f=>factories[f.id]=f);
    loaded=true;
    document.getElementById('stats').innerHTML=
      `<div class="chip">🏭 <b>${fl.length}</b> FACTORIES</div>`+
      `<div class="chip">📦 <b>${series.length}</b> SERIES</div>`+
      `<div class="chip" id="cnt">⌕ AWAITING QUERY</div>`;
  }catch(e){
    document.getElementById('stats').innerHTML='<div class="chip" style="border-color:rgba(255,0,170,.3);color:var(--magenta)">✖ CONNECTION FAILED</div>'}
}

// === 搜索 ===
let hits=[];
function search(){
  if(!loaded)return;
  const kw=document.getElementById('kw').value.trim().toUpperCase();
  const el=document.getElementById('list'),th=document.getElementById('th'),
    dt=document.getElementById('detail'),cnt=document.getElementById('cnt');
  if(!kw){el.innerHTML='';th.style.display='none';dt.className='detail';cnt&&(cnt.innerHTML='⌕ AWAITING QUERY');return}
  hits=[];
  for(const s of series){
    if((s.s||'').toUpperCase().includes(kw)||(s.n||'').toUpperCase().includes(kw)){
      hits.push({sid:s.i,code:s.s,name:s.n,fid:s.j,factory:(factories[s.j]||{}).n||s.j});
      if(hits.length>=80)break}}
  th.style.display=hits.length?'':'none';dt.className='detail';
  cnt&&(cnt.innerHTML=`⌕ <b>${hits.length}</b> RESULTS`);
  el.innerHTML=hits.map((r,i)=>`<div class="row" data-i="${i}" ondblclick="detail(${i})">`+
    `<div class="idx">${String(i+1).padStart(2,'0')}</div>`+
    `<div class="code">${e(r.code)}</div>`+
    `<div class="name">${e(r.name)}</div>`+
    `<div class="factory">${e(r.factory)}</div></div>`).join('')}
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}

let db;
document.getElementById('kw').addEventListener('keydown',ev=>{if(ev.key==='Enter')search()});
document.getElementById('kw').addEventListener('input',()=>{clearTimeout(db);db=setTimeout(search,280)});

// === 详情（双击）===
async function detail(idx){
  const r=hits[idx];if(!r)return;
  document.querySelectorAll('.row').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.row[data-i="${idx}"]`)?.classList.add('active');
  const dt=document.getElementById('detail');
  dt.className='detail show';
  dt.innerHTML=`<div class="d-head"><div><h3>${e(r.code)} — ${e(r.name)}</h3>`+
    `<div class="sub">${e(r.factory)} · SID ${r.sid}</div></div>`+
    `<button class="d-close" onclick="document.getElementById('detail').className='detail'">✖ CLOSE</button></div>`+
    `<div class="d-body"><div class="loading-d">LOADING SAMPLE DATA<span class="cursor">_</span></div></div>`;
  dt.scrollIntoView({behavior:'smooth',block:'nearest'});
  try{
    const data=await apiPost('https://tmmp.titanmatrix.com/wxmp_factory/common/sample/series',{sId:r.sid});
    let h='<h4>📄 SAMPLE DOCUMENTS</h4>';
    if(data.code===1&&Array.isArray(data.entity)&&data.entity.length){
      h+=data.entity.map(s=>{
        const pic=s.docPicPath||'';
        const pdf=pic.replace('/pic/','/file/').replace('.jpg','.pdf');
        const sz=s.sampleLength?(s.sampleLength/1024/1024).toFixed(1)+'MB':'';
        return`<a class="s-item" href="${e(pdf)}" target="_blank"><div class="s-icon">PDF</div>`+
          `<div class="s-info"><div class="sn">${e(s.sampleName||'样本')}</div><div class="su">${e(pdf)}</div></div>`+
          `<div class="s-dl">${sz} ↓</div></a>`}).join('')}
    else if(data.code===0){
      h+=`<div class="no-data">API ERROR: ${e(data.msg||'参数错误')}</div>`+
        `<div style="margin-top:12px;font-size:10px;color:rgba(0,240,255,.15)">TIP: Try opening from NAS local network for full proxy access</div>`;
    }
    else h+='<div class="no-data">NO SAMPLES AVAILABLE</div>';
    dt.querySelector('.d-body').innerHTML=h;
  }catch(err){
    dt.querySelector('.d-body').innerHTML=`<h4>📄 SAMPLE DOCUMENTS</h4>`+
      `<div class="no-data">NETWORK ERROR: ${e(err.message)}</div>`+
      `<div style="margin-top:12px"><a class="s-item" href="https://cdn.titanmatrix.com/samples/${r.fid}/" target="_blank" style="border-color:rgba(168,85,247,.2)">`+
      `<div class="s-icon" style="background:linear-gradient(135deg,var(--purple),#7c3aed)">CDN</div>`+
      `<div class="s-info"><div class="sn">Browse CDN Samples Directory</div>`+
      `<div class="su">cdn.titanmatrix.com/samples/${r.fid}/</div></div></a></div>`}
}
</script>
</body>
</html>
